<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cambridge Paper Scanner</title>
  <script src="https://unpkg.com/tesseract.js@2.1.5/dist/tesseract.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a; color: white; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; padding: 20px 16px; gap: 12px;
    }
    h1 { font-size: 1.3rem; color: #60a5fa; }
    #video-container {
      position: relative; width: 100%; max-width: 420px; border-radius: 16px;
      overflow: hidden; border: 2px solid #1e40af; display: none;
      box-shadow: 0 0 30px rgba(59,130,246,0.3);
    }
    video { width: 100%; display: block; }
    #aim-box {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 85%; height: 70px; border: 3px solid #34d399; border-radius: 8px; pointer-events: none;
    }
    .camera-controls { width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 10px; }
    #progress-bar-wrap { width: 100%; height: 6px; background: #1e293b; border-radius: 10px; display: none; overflow: hidden; }
    #progress-bar { height: 100%; width: 0%; background: #34d399; transition: width 0.1s; }
    .action-row { display: flex; gap: 8px; justify-content: center; width: 100%; }
    #result-box { width: 100%; max-width: 420px; background: #1e293b; border-radius: 14px; padding: 16px; border: 1px solid #334155; }
    .result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .rlabel { font-size: 0.65rem; color: #64748b; text-transform: uppercase; letter-spacing: 1px; }
    #result-text { font-size: 1.2rem; color: #34d399; font-weight: 700; }
    .btn { padding: 12px 24px; border-radius: 50px; font-weight: 700; cursor: pointer; border: none; font-size: 0.95rem; transition: 0.2s; }
    .btn-primary { background: linear-gradient(135deg, #3b82f6, #6366f1); color: white; width: 100%; }
    .btn-stop { background: transparent; color: #f87171; border: 1px solid #f87171; width: 60px; }
    #status { font-size: 0.85rem; color: #94a3b8; text-align: center; }
    canvas { display: none; }
    .divider { border: none; border-top: 1px solid #334155; margin: 10px 0; }
  </style>
</head>
<body>

  <h1>📄 Cambridge Paper Scanner</h1>

  <div id="video-container">
    <video id="video" autoplay playsinline muted></video>
    <div id="aim-box"></div>
  </div>

  <div class="camera-controls">
    <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
    <div class="action-row">
      <button class="btn btn-primary" id="start-btn" onclick="startCamera()">📷 Open Camera</button>
      <button class="btn btn-primary" id="capture-btn" onclick="captureAndScan()" style="display:none" disabled>⚡ Capture & Scan</button>
      <button class="btn btn-stop" id="stop-btn" onclick="stopCamera()" style="display:none">✕</button>
    </div>
    <div id="status">Engine ready</div>
  </div>

  <div id="result-box">
    <div class="result-header"><span class="rlabel">Output (Auto-Copied)</span></div>
    <div id="result-text">—</div>
    <hr class="divider">
    <div class="rlabel">Detected Code</div>
    <div id="raw-text" style="font-size: 0.85rem; color: #94a3b8; font-family: monospace;">—</div>
  </div>

  <canvas id="canvas"></canvas>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const resultEl = document.getElementById('result-text');
    const rawEl = document.getElementById('raw-text');
    const statusEl = document.getElementById('status');
    const progressWrap = document.getElementById('progress-bar-wrap');
    const progressBar = document.getElementById('progress-bar');
    const captureBtn = document.getElementById('capture-btn');
    const startBtn = document.getElementById('start-btn');
    
    let stream = null;
    let worker = null;

    async function initWorker() {
      if (worker) return;
      worker = Tesseract.createWorker({
        logger: m => {
          if (m.status === 'recognizing text') {
            progressBar.style.width = Math.round(m.progress * 100) + '%';
          }
        }
      });
      await worker.load();
      await worker.loadLanguage('eng');
      await worker.initialize('eng');
      // Added lowercase letters back to the whitelist so f/m isn't ignored
      await worker.setParameters({
        tessedit_char_whitelist: '0123456789/MFJONmfjon- ',
      });
    }

    function formatFinal(match) {
      const pNum = match[2];
      const vNum = match[3];
      const sess = match[4].toUpperCase();
      const year = match[5];

      let sName = sess;
      if (/[FM]/.test(sess)) sName = 'March';
      else if (/[MJ]/.test(sess)) sName = 'Summer';
      else if (/[ON]/.test(sess)) sName = 'Winter';

      return `Paper ${pNum} Variant ${vNum} ${sName} 20${year}`;
    }

    function extractCode(raw) {
      // FIX: Keep both uppercase AND lowercase letters, then capitalize them.
      // The previous bug destroyed 'f/m' before it could be read.
      const clean = raw.replace(/[^0-9a-zA-Z]/g, '').toUpperCase();
      
      // LOGIC: (Subject:4 digits) (Paper:1-8) (Variant:1-6) (Session:MFJON) (Year:20-26)
      const regex = /(\d{4})([1-8])([1-6])([MFJON]{1,4})(2[0-6])/;
      const m = clean.match(regex);
      return m;
    }

    async function startCamera() {
      try {
        statusEl.textContent = 'Loading...';
        await initWorker();
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', width: { ideal: 1280 } }
        });
        video.srcObject = stream;
        document.getElementById('video-container').style.display = 'block';
        startBtn.style.display = 'none';
        captureBtn.style.display = 'inline-block';
        document.getElementById('stop-btn').style.display = 'inline-block';
        captureBtn.disabled = false;
        statusEl.textContent = 'Align and tap Capture';
      } catch (err) {
        statusEl.textContent = 'Error: ' + err.message;
      }
    }

    async function captureAndScan() {
      captureBtn.disabled = true;
      progressWrap.style.display = 'block';
      statusEl.textContent = 'Analyzing...';

      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;

      // Contrast boost to make standard text super clear to the OCR
      ctx.filter = 'grayscale(100%) contrast(250%) brightness(120%)';
      ctx.drawImage(video, 0, 0);
      ctx.filter = 'none';
      
      try {
        const { data: { text } } = await worker.recognize(canvas);
        const match = extractCode(text);
        
        if (match) {
          const finalStr = formatFinal(match);
          resultEl.textContent = finalStr;
          // Format it beautifully with slashes
          rawEl.textContent = `${match[1]}/${match[2]}${match[3]}/${match[4]}/${match[5]}`;
          statusEl.textContent = '✅ Copied to clipboard!';
          navigator.clipboard.writeText(finalStr);
        } else {
          statusEl.textContent = '❌ No code found. Move closer.';
          // Show what it ACTUALLY saw so you can debug if you hold it too far
          rawEl.textContent = "Scanner saw: " + text.replace(/\s/g, '').substring(0, 15);
        }
      } catch (err) {
        statusEl.textContent = 'Scanner error. Try again.';
      }
      
      progressWrap.style.display = 'none';
      captureBtn.disabled = false;
    }

    function stopCamera() {
      if (stream) stream.getTracks().forEach(t => t.stop());
      document.getElementById('video-container').style.display = 'none';
      startBtn.style.display = 'inline-block';
      captureBtn.style.display = 'none';
      document.getElementById('stop-btn').style.display = 'none';
      statusEl.textContent = 'Camera stopped';
    }
  </script>
</body>
</html>
