<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cambridge Scanner Pro</title>
  <script src="https://unpkg.com/tesseract.js@2.1.5/dist/tesseract.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #1a2a3a;
      --card-bg: #004d4d;
      --text-main: #ffffff;
      --accent-teal: #006666;
      --progress-bg: #4a5a6a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 50px 20px;
    }

    .header { text-align: center; margin-bottom: 30px; }
    .header h1 {
      font-family: 'Montserrat', sans-serif;
      font-size: 2.2rem;
      font-weight: 400;
      letter-spacing: 2px;
      margin-bottom: 5px;
    }
    .header p { font-size: 0.9rem; opacity: 0.8; font-weight: 300; }

    #video-wrap {
      width: 100%;
      max-width: 340px;
      height: 240px;
      background: var(--card-bg);
      border-radius: 15px;
      position: relative;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 25px;
    }

    video { width: 100%; height: 100%; object-fit: cover; display: none; }
    #uploaded-img { width: 100%; height: 100%; object-fit: contain; display: none; background: #0b1926; }

    #aim-box {
      position: absolute;
      width: 80%;
      height: 55px;
      border: 2px solid #ffffff;
      border-radius: 10px;
      pointer-events: none;
      z-index: 5;
    }

    .action-row {
      display: flex;
      gap: 10px;
      margin-bottom: 40px;
      width: 100%;
      max-width: 340px;
      justify-content: space-between;
    }

    .btn-action {
      background: transparent;
      color: white;
      border: 1.5px solid #ffffff;
      padding: 10px 0;
      border-radius: 10px;
      font-size: 1rem;
      font-family: 'Outfit', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      flex: 1;
      text-align: center;
    }
    .btn-action:active { background: rgba(255,255,255,0.1); transform: scale(0.96); }
    .btn-action:disabled { opacity: 0.5; cursor: not-allowed; }

    .output-section { width: 100%; max-width: 340px; position: relative; }

    .output-section h2 {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.8rem;
      margin-bottom: 10px;
    }

    .output-box {
      width: 100%;
      background: linear-gradient(90deg, #004d4d 0%, #1a2a3a 100%);
      padding: 15px;
      border-radius: 8px;
      font-size: 1.1rem;
      color: #ffffff;
      min-height: 50px;
      display: flex;
      align-items: center;
      box-shadow: inset 0 0 15px rgba(0, 255, 255, 0.1);
    }

    .copy-status-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 10px;
    }

    .toggle-btn {
      background: transparent;
      border: 1px solid #ffffff;
      color: white;
      padding: 5px 12px;
      border-radius: 12px;
      font-size: 0.7rem;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      transition: opacity 0.3s;
    }
    .toggle-btn.off { opacity: 0.4; border-color: rgba(255,255,255,0.5); }

    .progress-container {
      width: 100%;
      height: 2px;
      background: var(--progress-bg);
      margin-top: 10px;
    }
    #bar { height: 100%; background: #ffffff; width: 0%; transition: width 0.1s; }
    .progress-label { font-size: 0.7rem; margin-top: 5px; opacity: 0.7; }

    canvas { display: none; }
  </style>
</head>
<body>

  <div class="header">
    <h1>CAMBRIDGE IS GAY</h1>
    <p>idk man how i created ts it happened</p>
  </div>

  <div id="video-wrap">
    <video id="video" autoplay playsinline muted></video>
    <img id="uploaded-img" alt="Uploaded paper code preview">
    <div id="aim-box"></div>
    <div id="loading-msg">Camera Off</div>
  </div>

  <div class="action-row">
    <button class="btn-action" id="main-btn" onclick="handleFlow()">scan</button>
    <label class="btn-action" for="file-upload" style="cursor:pointer;display:flex;align-items:center;justify-content:center;">upload</label>
    <input type="file" id="file-upload" accept="image/*" style="display:none;" onchange="handleFileUpload(event)">
    <button class="btn-action" onclick="handleManualPaste()">paste</button>
  </div>

  <div class="output-section">
    <h2>Output</h2>
    <div class="output-box" id="result-text">output here</div>

    <div class="copy-status-row">
      <button class="toggle-btn off" id="copy-toggle" onclick="toggleCopy()">auto copy off</button>
    </div>

    <div class="progress-container"><div id="bar"></div></div>
    <p class="progress-label" id="prog-label">progress bar</p>
  </div>

  <canvas id="canvas"></canvas>

  <script>
    // ── Element refs ──────────────────────────────────────────────────────────
    const video       = document.getElementById('video');
    const uploadedImg = document.getElementById('uploaded-img');
    const canvas      = document.getElementById('canvas');
    const ctx         = canvas.getContext('2d');
    const resultEl    = document.getElementById('result-text');
    const mainBtn     = document.getElementById('main-btn');
    const bar         = document.getElementById('bar');
    const progLabel   = document.getElementById('prog-label');
    const copyToggle  = document.getElementById('copy-toggle');
    const aimBox      = document.getElementById('aim-box');

    let stream      = null;
    let worker      = null;
    let isCameraOn  = false;
    let currentMode = 'camera';
    let autoCopy    = false;
    let scanning    = false; // prevents double-tap races

    // ── Paste support ─────────────────────────────────────────────────────────
    window.addEventListener('paste', e => {
      const items = (e.clipboardData || e.originalEvent.clipboardData).items;
      for (const item of Object.values(items)) {
        if (item.kind === 'file') { processImageFile(item.getAsFile()); break; }
      }
    });

    async function handleManualPaste() {
      try {
        const items = await navigator.clipboard.read();
        for (const item of items) {
          const imgType = item.types.find(t => t.startsWith('image/'));
          if (imgType) { processImageFile(await item.getType(imgType)); return; }
        }
        setLabel('No image in clipboard.');
      } catch { setLabel('Clipboard access denied — try uploading instead.'); }
    }

    // ── Auto-copy toggle ──────────────────────────────────────────────────────
    function toggleCopy() {
      autoCopy = !autoCopy;
      copyToggle.textContent = autoCopy ? 'auto copy on' : 'auto copy off';
      copyToggle.classList.toggle('off', !autoCopy);
    }

    // ── File / image handling ─────────────────────────────────────────────────
    function handleFileUpload(e) {
      if (e.target.files[0]) processImageFile(e.target.files[0]);
    }

    function processImageFile(blob) {
      const url = URL.createObjectURL(blob);
      uploadedImg.onload = () => {
        // Stop camera if running
        if (stream) { stream.getTracks().forEach(t => t.stop()); isCameraOn = false; }

        video.style.display       = 'none';
        uploadedImg.style.display = 'block';
        document.getElementById('loading-msg').style.display = 'none';
        aimBox.style.display      = 'none'; // aim box not useful for still images

        currentMode          = 'image';
        mainBtn.textContent  = 'scan image';
      };
      uploadedImg.src = url;
    }

    // ── Main flow button ──────────────────────────────────────────────────────
    async function handleFlow() {
      if (scanning) return; // prevent double-tap

      if (currentMode === 'camera' && !isCameraOn) {
        // ── Start camera ──
        mainBtn.textContent = 'starting…';
        await ensureWorker();
        try {
          stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment', width: { ideal: 1280 } }
          });
          video.srcObject   = stream;
          await video.play();
          video.style.display       = 'block';
          uploadedImg.style.display = 'none';
          document.getElementById('loading-msg').style.display = 'none';
          aimBox.style.display      = 'block';
          isCameraOn                = true;
          mainBtn.textContent       = 'scan';
          setLabel('Align code then tap scan.');
        } catch (e) {
          setLabel('Camera access denied.');
          mainBtn.textContent = 'scan';
        }
      } else {
        // ── Capture and scan ──
        await ensureWorker();
        scan();
      }
    }

    // ── Worker init (lazy, once) ──────────────────────────────────────────────
    async function ensureWorker() {
      if (worker) return;
      setLabel('Loading OCR engine…');
      worker = Tesseract.createWorker({
        logger: m => {
          if (m.status === 'recognizing text') {
            const pct = Math.round(m.progress * 100);
            bar.style.width = pct + '%';
            setLabel('Reading… ' + pct + '%');
          }
        }
      });
      await worker.load();
      await worker.loadLanguage('eng');
      await worker.initialize('eng');

      // PSM 11 = sparse text — best for finding a code anywhere on the image
      // No char whitelist: the robust regex is a better filter than Tesseract's
      await worker.setParameters({ tessedit_pageseg_mode: '11' });
      setLabel('OCR ready.');
    }

    // ── Image preprocessing ───────────────────────────────────────────────────
    // Upscale 3× + grayscale + contrast boost + sharpening.
    // Counteracts blur from cropping and low camera resolution.
    function preprocess(srcCanvas) {
      const SCALE = 3;
      const w = srcCanvas.width  * SCALE;
      const h = srcCanvas.height * SCALE;

      const dst = document.createElement('canvas');
      dst.width  = w;
      dst.height = h;
      const dc   = dst.getContext('2d');

      // Hardware-accelerated grayscale + contrast in one pass
      dc.filter = 'grayscale(1) contrast(2.2) brightness(1.08)';
      dc.imageSmoothingEnabled  = true;
      dc.imageSmoothingQuality  = 'high';
      dc.drawImage(srcCanvas, 0, 0, w, h);
      dc.filter = 'none'; // reset

      // 3×3 unsharp-mask kernel to restore edges lost to blur
      sharpen(dc, w, h, 0.5);

      return dst;
    }

    function sharpen(dc, w, h, mix) {
      const idata = dc.getImageData(0, 0, w, h);
      const src   = new Uint8ClampedArray(idata.data);
      const d     = idata.data;
      const K     = [0, -1, 0, -1, 5, -1, 0, -1, 0]; // laplacian sharpen kernel

      for (let y = 1; y < h - 1; y++) {
        for (let x = 1; x < w - 1; x++) {
          let v = 0;
          for (let ky = -1; ky <= 1; ky++)
            for (let kx = -1; kx <= 1; kx++)
              v += src[((y + ky) * w + (x + kx)) * 4] * K[(ky + 1) * 3 + (kx + 1)];
          const i   = (y * w + x) * 4;
          const val = Math.min(255, Math.max(0, src[i] * (1 - mix) + v * mix));
          d[i] = d[i + 1] = d[i + 2] = val;
          d[i + 3] = 255;
        }
      }
      dc.putImageData(idata, 0, 0);
    }

    // ── Scan ──────────────────────────────────────────────────────────────────
    async function scan() {
      if (scanning) return;
      scanning        = true;
      mainBtn.disabled = true;
      bar.style.width  = '0%';

      try {
        if (currentMode === 'image') {
          // For uploaded images: crop bottom 22%, centre 70%
          // Cambridge codes always sit at bottom-centre of full paper images.
          const iw = uploadedImg.naturalWidth;
          const ih = uploadedImg.naturalHeight;

          if (!iw || !ih) throw new Error('Image not loaded yet.');

          const cropW = Math.round(iw * 0.70);
          const cropH = Math.round(ih * 0.22);
          const cropX = Math.round((iw - cropW) / 2);
          const cropY = ih - cropH;

          canvas.width  = cropW;
          canvas.height = cropH;
          ctx.filter    = 'none';
          ctx.drawImage(uploadedImg, cropX, cropY, cropW, cropH, 0, 0, cropW, cropH);

        } else if (isCameraOn) {
          // For camera: capture full frame (user aims at code)
          canvas.width  = video.videoWidth;
          canvas.height = video.videoHeight;
          ctx.filter    = 'none';
          ctx.drawImage(video, 0, 0);

        } else {
          setLabel('No image or camera available.');
          return;
        }

        // Preprocess canvas before Tesseract sees it
        setLabel('Preprocessing…');
        const processed = preprocess(canvas);

        setLabel('Reading…');
        const { data: { text } } = await worker.recognize(processed);

        const raw  = text.trim();
        const code = extractCode(raw);

        if (code) {
          const output = outPaper(code);
          resultEl.textContent = output;
          setLabel('✅ Found: ' + code);

          if (autoCopy) {
            await navigator.clipboard.writeText(output);
            const prev = copyToggle.textContent;
            copyToggle.textContent = 'COPIED!';
            setTimeout(() => { copyToggle.textContent = prev; }, 1000);
          }
        } else {
          resultEl.textContent = 'No code found';
          setLabel('⚠️ No code detected — hold steadier or get closer.');
        }

      } catch (err) {
        resultEl.textContent = 'Error';
        setLabel('Error: ' + (err.message || err));
      } finally {
        bar.style.width  = '0%';
        mainBtn.disabled = false;
        scanning         = false;
      }
    }

    // ── extractCode ───────────────────────────────────────────────────────────
    // Handles: / - – — _ | · no-separator at all, OCR char confusions
    function extractCode(raw) {
      const text = raw.replace(/\s+/g, ' ').trim();

      // Normalise common digit OCR confusions
      function normD(s) {
        return s
          .replace(/[oO]/g, '0')
          .replace(/[lI]/g,  '1')
          .replace(/[sS]/g,  '5')
          .replace(/[zZ]/g,  '2')
          .replace(/[gG]/g,  '9')
          .replace(/[bB]/g,  '8');
      }

      // Any separator or none:  / - – — _ | · spaces
      const SEP = '[\\s\\/\\-\u2013\u2014\u2015\u2212\\_\\|\\.\\u00b7]*';

      function tryMatch(t) {
        // A) Standard: 4d SEP 1-2d SEP 2L SEP 2d  (e.g. 9709/12/MJ/23)
        let m = t.match(
          new RegExp('(\\d{4})' + SEP + '(\\d{1,3})' + SEP + '([A-Za-z]{2})' + SEP + '(\\d{2})(?!\\d)')
        );
        if (m) return `${normD(m[1])}/${normD(m[2])}/${m[3].toUpperCase()}/${normD(m[4])}`;

        // B) Split session: 4d SEP 1-2d SEP 1L SEP 1L SEP 2d  (e.g. 9709/12/F/M/23)
        m = t.match(
          new RegExp('(\\d{4})' + SEP + '(\\d{1,3})' + SEP + '([A-Za-z0])' + SEP + '([A-Za-z])' + SEP + '(\\d{2})(?!\\d)')
        );
        if (m) return `${normD(m[1])}/${normD(m[2])}/${(m[3] + m[4]).toUpperCase()}/${normD(m[5])}`;

        // C) No separators at all: 4d 2d 2L 2d  (e.g. 970912MJ23)
        m = t.match(/(\d{4})(\d{2})([A-Za-z]{2})(\d{2})(?!\d)/);
        if (m) return `${m[1]}/${m[2]}/${m[3].toUpperCase()}/${m[4]}`;

        // D) No separators, split session: 4d 2d 1L 1L 2d
        m = t.match(/(\d{4})(\d{2})([A-Za-z])([A-Za-z])(\d{2})(?!\d)/);
        if (m) return `${m[1]}/${m[2]}/${(m[3] + m[4]).toUpperCase()}/${m[5]}`;

        return null;
      }

      return tryMatch(text) || tryMatch(normD(text));
    }

    // ── outPaper ──────────────────────────────────────────────────────────────
    function outPaper(code) {
      // Strip separators → e.g. "9709/12/MJ/23" → "970912MJ23"
      const p  = code.replace(/\//g, '').replace(/\s/g, '').trim();
      let out  = 'Paper ' + p[4] + ' Variant ' + p[5];
      const sf = p[6].toUpperCase();
      if      (sf === 'F')               out += ' March';
      else if (sf === 'M')               out += ' Summer';
      else if (sf === 'O' || sf === '0') out += ' Winter';
      else                               out += ' ' + p.substring(6, 8);
      out += ' 20' + p.slice(-2);
      return out;
    }

    function setLabel(msg) {
      progLabel.textContent = msg;
    }
  </script>
</body>
</html>
