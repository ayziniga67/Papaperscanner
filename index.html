<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIE Question Searcher</title>
    <script src="https://unpkg.com/tesseract.js@2.1.5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 400px; background: var(--card); padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        h1 { font-size: 1.5rem; text-align: center; margin-bottom: 5px; color: var(--accent); }
        p { font-size: 0.8rem; text-align: center; opacity: 0.7; margin-bottom: 20px; }
        #preview { width: 100%; height: 200px; background: #000; border-radius: 12px; object-fit: contain; margin-bottom: 15px; }
        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; background: var(--accent); color: var(--bg); font-weight: 600; cursor: pointer; margin-bottom: 10px; }
        .btn-alt { background: transparent; border: 1px solid var(--accent); color: var(--accent); }
        #status { font-size: 0.9rem; margin-top: 15px; text-align: center; font-style: italic; }
        .result-box { margin-top: 20px; padding: 15px; background: rgba(56, 189, 248, 0.1); border-left: 4px solid var(--accent); border-radius: 4px; display: none; }
        a { color: var(--accent); text-decoration: none; font-weight: bold; display: block; margin-top: 10px; }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>Question Finder</h1>
    <p>Scan a question to find the Mark Scheme page</p>
    
    <img id="preview" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
    
    <input type="file" id="file-input" accept="image/*" style="display:none" onchange="handleFile(event)">
    <button class="btn" onclick="document.getElementById('file-input').click()">Upload Question Photo</button>
    <button id="scan-btn" class="btn btn-alt" style="display:none" onclick="startDeepSearch()">Start Deep Search</button>

    <div id="status"></div>

    <div id="result" class="result-box">
        <span id="paper-info"></span>
        <a id="ms-link" target="_blank">View Mark Scheme (Page 1)</a>
    </div>
</div>

<canvas id="temp-canvas"></canvas>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
    
    let scannedText = "";
    let paperMetadata = null;

    function handleFile(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (f) => {
            document.getElementById('preview').src = f.target.result;
            document.getElementById('scan-btn').style.display = 'block';
            document.getElementById('status').textContent = "Image ready. Click Search.";
        };
        reader.readAsDataURL(file);
    }

    async function startDeepSearch() {
        const btn = document.getElementById('scan-btn');
        const status = document.getElementById('status');
        btn.disabled = true;
        status.textContent = "Reading text from image...";

        const worker = Tesseract.createWorker();
        await worker.load();
        await worker.loadLanguage('eng');
        await worker.initialize('eng');
        
        const { data: { text } } = await worker.recognize(document.getElementById('preview'));
        scannedText = text;
        await worker.terminate();

        // 1. Identify the paper using your logic
        identifyPaper(text);
    }

    function identifyPaper(text) {
        const clean = text.toUpperCase().replace(/[^A-Z0-9_/ ]/g, '');
        // Using your refined mSlash pattern
        const mSlash = clean.match(/(\d{4})?[\s/]*(\d)([\d])?[\s/]+(M[\s/]*J|O[\s/]*N|F[\s/]*M|S|W|M)[\s/]*(?:20)?(\d{2})/);

        if (mSlash) {
            const sub = mSlash[1] || "9709";
            const pap = mSlash[2];
            const varnt = mSlash[3] || "1";
            const yr = mSlash[5];
            let sStr = mSlash[4].replace(/[\s/]/g, '');
            let seas = (sStr==='MJ'||sStr==='S')?'s':(sStr==='ON'||sStr==='W'?'w':'m');

            paperMetadata = { sub, seas, yr, pap, varnt };
            const qpUrl = `https://pastpapers.papacambridge.com/directories/CAIE/CAIE-pastpapers/upload/${sub}_${seas}${yr}_qp_${pap}${varnt}.pdf`;
            searchInsidePdf(qpUrl, text);
        } else {
            document.getElementById('status').textContent = "Couldn't identify Paper Code from image.";
            document.getElementById('scan-btn').disabled = false;
        }
    }

    async function searchInsidePdf(qpUrl, queryText) {
        const status = document.getElementById('status');
        status.textContent = "Paper found! Downloading & searching pages...";

        // Use CORS Proxy to reach PapaCambridge
        const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(qpUrl)}`;

        try {
            const loadingTask = pdfjsLib.getDocument(proxyUrl);
            const pdf = await loadingTask.promise;
            
            // Clean the query text (first 25 characters of the question)
            const searchTerms = queryText.toLowerCase().replace(/[^a-z0-9 ]/g, '').split(' ').filter(w => w.length > 3).slice(0, 5);
            
            let foundPage = 1;

            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                const pageText = content.items.map(item => item.str).join(' ').toLowerCase();

                // Simple check: if most keywords match this page
                let matches = searchTerms.filter(word => pageText.includes(word)).length;
                if (matches >= 2) {
                    foundPage = i;
                    break;
                }
            }

            displayResult(foundPage);
        } catch (e) {
            status.textContent = "Error reading PDF. Proxy may be down.";
            document.getElementById('scan-btn').disabled = false;
        }
    }

    function displayResult(page) {
        const m = paperMetadata;
        document.getElementById('status').textContent = "Search Complete!";
        document.getElementById('result').style.display = 'block';
        document.getElementById('paper-info').textContent = `${m.sub} Paper ${m.pap}${m.varnt} Year 20${m.yr}`;
        
        const msUrl = `https://pastpapers.papacambridge.com/directories/CAIE/CAIE-pastpapers/upload/${m.sub}_${m.seas}${m.yr}_ms_${m.pap}${m.varnt}.pdf`;
        
        const link = document.getElementById('ms-link');
        link.href = `${msUrl}#page=${page}`;
        link.textContent = `Open Mark Scheme at Page ${page}`;
    }
</script>

</body>
</html>
