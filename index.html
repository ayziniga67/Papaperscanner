<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cambridge Paper Scanner</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
      gap: 12px;
    }
    h1 { font-size: 1.3rem; color: #60a5fa; }
    #video-container {
      position: relative;
      width: 100%;
      max-width: 420px;
      border-radius: 16px;
      overflow: hidden;
      border: 2px solid #1e40af;
      display: none;
      box-shadow: 0 0 30px rgba(59,130,246,0.2);
    }
    video { width: 100%; display: block; }
    #aim-box {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 85%; height: 60px;
      border: 2px solid #60a5fa;
      border-radius: 6px;
      pointer-events: none;
    }
    canvas { display: none; }
    #status {
      font-size: 0.85rem;
      text-align: center;
      color: #94a3b8;
      min-height: 20px;
    }
    #result-box {
      width: 100%;
      max-width: 420px;
      background: #1e293b;
      border-radius: 14px;
      padding: 18px;
      border: 1px solid #334155;
    }
    #result-text { font-size: 1.2rem; color: #34d399; font-weight: 700; margin-bottom: 8px; }
    #raw-text { font-size: 0.85rem; color: #64748b; font-family: monospace; }
    .btn-primary {
      padding: 14px 32px;
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      color: white; border: none; border-radius: 50px; font-size: 1rem; font-weight: 600; cursor: pointer;
    }
    .btn-secondary {
      padding: 10px 20px;
      background: #1e293b;
      color: #94a3b8; border: 1px solid #334155; border-radius: 50px; cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>📄 Cambridge Paper Scanner</h1>
  <div id="status">Ready to scan</div>

  <div id="video-container">
    <video id="video" autoplay playsinline muted></video>
    <div id="aim-box"></div>
  </div>

  <div id="result-box">
    <div style="font-size:0.7rem; color:#64748b; text-transform:uppercase; margin-bottom:4px;">Detected Paper</div>
    <div id="result-text">—</div>
    <div id="raw-text">—</div>
  </div>

  <div id="actions" style="display: flex; gap: 10px;">
    <button class="btn-primary" id="start-btn" onclick="initCamera()">📷 Open Camera</button>
    <button class="btn-primary" id="capture-btn" onclick="captureAndScan()" style="display:none">⚡ Scan Now</button>
    <button class="btn-secondary" onclick="document.getElementById('file-input').click()">🖼 Upload</button>
  </div>

  <input type="file" id="file-input" style="display:none" accept="image/*" onchange="handleFile(event)">
  <canvas id="canvas"></canvas>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const status = document.getElementById('status');
    const resultText = document.getElementById('result-text');
    const rawText = document.getElementById('raw-text');
    const startBtn = document.getElementById('start-btn');
    const captureBtn = document.getElementById('capture-btn');
    const vc = document.getElementById('video-container');

    let stream = null;

    async function initCamera() {
      try {
        status.textContent = "Requesting camera...";
        stream = await navigator.mediaDevices.getUserMedia({ 
          video: { facingMode: "environment", width: { ideal: 1280 } } 
        });
        video.srcObject = stream;
        vc.style.display = "block";
        startBtn.style.display = "none";
        captureBtn.style.display = "inline-block";
        status.textContent = "Align code in box and scan";
      } catch (err) {
        status.textContent = "Camera Error: " + err.message;
      }
    }

    async function captureAndScan() {
      status.textContent = "Capturing...";
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(video, 0, 0);
      processAndOCR(canvas);
    }

    function handleFile(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (event) => {
        const img = new Image();
        img.onload = () => {
          canvas.width = img.width;
          canvas.height = img.height;
          canvas.getContext('2d').drawImage(img, 0, 0);
          processAndOCR(canvas);
        };
        img.src = event.target.result;
      };
      reader.readAsDataURL(file);
    }

    async function processAndOCR(sourceCanvas) {
      status.textContent = "Enhancing image...";
      
      // Basic Enhancement: Grayscale + Contrast
      const procCanvas = document.createElement('canvas');
      const pCtx = procCanvas.getContext('2d');
      procCanvas.width = sourceCanvas.width;
      procCanvas.height = sourceCanvas.height;
      pCtx.filter = 'grayscale(1) contrast(1.5) brightness(1.1)';
      pCtx.drawImage(sourceCanvas, 0, 0);

      status.textContent = "Reading (OCR)...";
      try {
        const { data: { text } } = await Tesseract.recognize(procCanvas, 'eng');
        const code = parseCambridgeCode(text);
        
        rawText.textContent = "Found: " + (text.substring(0, 30).replace(/\n/g, ' '));
        
        if (code) {
          resultText.textContent = formatPaperName(code);
          status.textContent = "Success!";
        } else {
          resultText.textContent = "Code not recognized";
          status.textContent = "Try again (closer or steadier)";
        }
      } catch (err) {
        status.textContent = "OCR Error: " + err.message;
      }
    }

    function parseCambridgeCode(text) {
      // Regex looks for 4 digits, separator, 2 digits, separator, 2 letters, separator, 2 digits
      const regex = /(\d{4})[\s\/\|-]*(\d{2})[\s\/\|-]*([A-Z]{2})[\s\/\|-]*(\d{2})/i;
      const match = text.match(regex);
      return match ? { sub: match[1], pap: match[2], ses: match[3].toUpperCase(), yr: match[4] } : null;
    }

    function formatPaperName(c) {
      let session = c.ses;
      if (session === 'MJ') session = "May/June";
      if (session === 'ON') session = "Oct/Nov";
      if (session === 'FM') session = "Feb/March";
      
      return `Subject ${c.sub} | Paper ${c.pap} | ${session} 20${c.yr}`;
    }
  </script>
</body>
</html>
