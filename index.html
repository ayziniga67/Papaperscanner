<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cambridge Scanner Pro</title>
  <script src="https://unpkg.com/tesseract.js@2.1.5/dist/tesseract.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #31273d;
      --card-bg: #2b2b2b;
      --accent: #7b6f86;
      --accent-hover: #8e8299;
      --text-main: #ffffff;
      --text-dim: #b3b3b3;
      --success: #34d399;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .header h1 {
      font-family: 'Oswald', sans-serif;
      font-size: 3.5rem;
      text-transform: uppercase;
      line-height: 1;
      text-align: center;
      letter-spacing: -1px;
    }

    .header p {
      font-size: 1.2rem;
      color: var(--text-main);
      text-align: center;
      margin-top: 10px;
      margin-bottom: 40px;
    }

    #video-wrap {
      width: 100%;
      max-width: 350px;
      height: 220px;
      background: var(--card-bg);
      border-radius: 12px;
      position: relative;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 25px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    video { width: 100%; height: 100%; object-fit: cover; display: none; }

    #aim-box {
      position: absolute;
      width: 85%;
      height: 60px;
      border: 1.5px solid rgba(255,255,255,0.3);
      border-radius: 8px;
      pointer-events: none;
      display: none;
    }

    /* Unified Button Design */
    .action-btn {
      background-color: var(--accent);
      color: white;
      border: none;
      padding: 12px 60px;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 30px;
      transition: all 0.2s;
      text-transform: lowercase;
    }

    .action-btn:active { transform: scale(0.96); }
    .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .output-card {
      width: 100%;
      max-width: 350px;
      background: var(--card-bg);
      border-radius: 12px;
      padding: 24px;
      position: relative;
      min-height: 180px;
    }

    .output-card h2 {
      font-family: 'Oswald', sans-serif;
      font-size: 2.2rem;
      margin-bottom: 15px;
    }

    .auto-copy-toggle {
      position: absolute;
      top: 24px;
      right: 20px;
      background: var(--accent);
      font-size: 0.65rem;
      padding: 6px 12px;
      border-radius: 50px;
      color: white;
      cursor: pointer;
      border: none;
      font-weight: bold;
    }

    .auto-copy-toggle.off { background: #444; color: #888; }

    #result-text {
      font-size: 1.5rem;
      font-weight: bold;
      margin-top: 10px;
      min-height: 1.5em;
    }

    #status {
      font-size: 0.8rem;
      color: var(--text-dim);
      margin-top: 12px;
    }

    #progress-bar {
      height: 4px;
      background: var(--success);
      width: 0%;
      margin-top: 15px;
      transition: width 0.1s;
    }

    canvas { display: none; }
  </style>
</head>
<body>

  <div class="header">
    <h1>CAMBRIGE IS GAY</h1>
    <p>code ---> simple words</p>
  </div>

  <div id="video-wrap">
    <video id="video" autoplay playsinline muted></video>
    <div id="aim-box"></div>
    <div id="placeholder" style="color: var(--text-dim); text-align: center; padding: 20px;">Camera Preview</div>
  </div>

  <button class="action-btn" id="main-btn" onclick="handleButtonClick()">start camera</button>

  <div class="output-card">
    <button class="auto-copy-toggle" id="copy-toggle" onclick="toggleAutoCopy()">auto copy on</button>
    <h2>Output</h2>
    <div id="result-text">xyz</div>
    <div id="status">Engine ready</div>
    <div id="progress-bar"></div>
  </div>

  <canvas id="canvas"></canvas>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const resultEl = document.getElementById('result-text');
    const statusEl = document.getElementById('status');
    const mainBtn = document.getElementById('main-btn');
    const progressBar = document.getElementById('progress-bar');
    const copyToggle = document.getElementById('copy-toggle');
    const aimBox = document.getElementById('aim-box');
    const placeholder = document.getElementById('placeholder');
    
    let stream = null;
    let worker = null;
    let autoCopyActive = true;
    let isCameraStarted = false;

    function toggleAutoCopy() {
      autoCopyActive = !autoCopyActive;
      copyToggle.textContent = autoCopyActive ? 'auto copy on' : 'auto copy off';
      copyToggle.className = autoCopyActive ? 'auto-copy-toggle' : 'auto-copy-toggle off';
    }

    async function handleButtonClick() {
      if (!isCameraStarted) {
        await startCamera();
      } else {
        await captureAndScan();
      }
    }

    async function initWorker() {
      if (worker) return;
      worker = Tesseract.createWorker({
        logger: m => {
          if (m.status === 'recognizing text') {
            progressBar.style.width = Math.round(m.progress * 100) + '%';
          }
        }
      });
      await worker.load();
      await worker.loadLanguage('eng');
      await worker.initialize('eng');
      await worker.setParameters({
        tessedit_char_whitelist: '0123456789MFJONmfjon/\\-.,;:_[]{}\| ',
      });
    }

    function extractCode(raw) {
      const clean = raw.replace(/[^0-9a-zA-Z]/g, '').toUpperCase();
      // Subject(4) Paper(1-8) Variant(1-6) Session(Letters) Year(20-26)
      const regex = /(\d{4})([1-8])([1-6])([MFJON]{1,4})(2[0-6])/;
      const m = clean.match(regex);
      
      if (m) {
        const sess = m[4];
        let sName = "Unknown";

        // Advanced Session Detection (Handles FM, MJ, ON and loose characters)
        if (sess.includes('F') || (sess.includes('M') && !sess.includes('J'))) sName = "March";
        if (sess.includes('J')) sName = "Summer";
        if (sess.includes('O') || sess.includes('N')) sName = "Winter";

        return `Paper ${m[2]} Variant ${m[3]} ${sName} 20${m[5]}`;
      }
      return null;
    }

    async function startCamera() {
      mainBtn.disabled = true;
      mainBtn.textContent = "loading...";
      try {
        await initWorker();
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', width: { ideal: 1280 } }
        });
        video.srcObject = stream;
        video.style.display = "block";
        aimBox.style.display = "block";
        placeholder.style.display = "none";
        
        isCameraStarted = true;
        mainBtn.textContent = "scan";
        statusEl.textContent = "Ready to scan";
      } catch (err) {
        statusEl.textContent = 'Camera error: ' + err.message;
        mainBtn.textContent = "start camera";
      }
      mainBtn.disabled = false;
    }

    async function captureAndScan() {
      mainBtn.disabled = true;
      statusEl.textContent = 'Scanning...';
      progressBar.style.width = '0%';

      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.filter = 'grayscale(100%) contrast(300%) brightness(115%)';
      ctx.drawImage(video, 0, 0);
      
      try {
        const { data: { text } } = await worker.recognize(canvas);
        const final = extractCode(text);
        
        if (final) {
          resultEl.textContent = final;
          statusEl.textContent = '✅ Success';
          if (autoCopyActive) {
            navigator.clipboard.writeText(final);
            const oldTag = copyToggle.textContent;
            copyToggle.textContent = 'COPIED!';
            setTimeout(() => { copyToggle.textContent = oldTag; }, 1200);
          }
        } else {
          resultEl.textContent = 'the output';
          statusEl.textContent = '❌ Invalid code pattern';
        }
      } catch (err) {
        statusEl.textContent = 'Scan failed. Try again.';
      }
      
      mainBtn.disabled = false;
      progressBar.style.width = '0%';
    }
  </script>
</body>
</html>
