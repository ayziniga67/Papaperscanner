<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cambridge Paper Scanner</title>
  <script src="https://unpkg.com/tesseract.js@2.1.5/dist/tesseract.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a; color: white; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; padding: 20px 16px; gap: 12px;
    }
    h1 { font-size: 1.3rem; color: #60a5fa; }
    #video-container {
      position: relative; width: 100%; max-width: 420px; border-radius: 16px;
      overflow: hidden; border: 2px solid #1e40af; display: none;
      box-shadow: 0 0 30px rgba(59,130,246,0.2);
    }
    video { width: 100%; display: block; }
    #aim-box {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 85%; height: 65px; border: 2px solid #60a5fa; border-radius: 6px; pointer-events: none;
    }
    .camera-controls { width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 10px; }
    #progress-bar-wrap { width: 100%; height: 6px; background: #1e293b; border-radius: 10px; display: none; overflow: hidden; }
    #progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #3b82f6, #34d399); transition: width 0.1s; }
    .action-row { display: flex; gap: 8px; justify-content: center; width: 100%; }
    #result-box { width: 100%; max-width: 420px; background: #1e293b; border-radius: 14px; padding: 16px; border: 1px solid #334155; }
    .result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .rlabel { font-size: 0.65rem; color: #64748b; text-transform: uppercase; letter-spacing: 1px; }
    #result-text { font-size: 1.15rem; color: #34d399; font-weight: 700; }
    .btn { padding: 12px 24px; border-radius: 50px; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; font-size: 0.9rem; }
    .btn-primary { background: linear-gradient(135deg, #3b82f6, #6366f1); color: white; }
    .btn-copy { padding: 4px 12px; font-size: 0.75rem; background: #334155; color: #e2e8f0; border-radius: 6px; }
    .btn-copy.success { background: #059669; color: white; }
    .btn-stop { background: transparent; color: #f87171; border: 1px solid #f87171; padding: 8px 16px; }
    #status { font-size: 0.8rem; color: #94a3b8; text-align: center; }
    #status.loading { color: #facc15; }
    #status.success { color: #34d399; }
    canvas { display: none; }
    .divider { border: none; border-top: 1px solid #334155; margin: 10px 0; }
  </style>
</head>
<body>

  <h1>📄 Cambridge Paper Scanner</h1>

  <div id="video-container">
    <video id="video" autoplay playsinline muted></video>
    <div id="aim-box"></div>
  </div>

  <div class="camera-controls">
    <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
    <div class="action-row">
      <button class="btn btn-primary" id="start-btn" onclick="startCamera()">📷 Start Camera</button>
      <button class="btn btn-primary" id="capture-btn" onclick="captureAndScan()" style="display:none" disabled>⚡ Capture & Scan</button>
      <button class="btn btn-stop" id="stop-btn" onclick="stopCamera()" style="display:none">✕</button>
    </div>
    <div id="status">Tap Start</div>
  </div>

  <div id="result-box">
    <div class="result-header">
      <span class="rlabel">Output</span>
      <button class="btn-copy" id="copy-btn">Auto-Copy On</button>
    </div>
    <div id="result-text">—</div>
    <hr class="divider">
    <div class="rlabel">Extracted</div>
    <div id="raw-text" style="font-size: 0.8rem; color: #94a3b8; font-family: monospace;">—</div>
  </div>

  <canvas id="canvas"></canvas>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const resultEl = document.getElementById('result-text');
    const rawEl = document.getElementById('raw-text');
    const statusEl = document.getElementById('status');
    const progressWrap = document.getElementById('progress-bar-wrap');
    const progressBar = document.getElementById('progress-bar');
    const captureBtn = document.getElementById('capture-btn');
    const startBtn = document.getElementById('start-btn');
    const stopBtn = document.getElementById('stop-btn');
    const copyBtn = document.getElementById('copy-btn');

    let stream = null;
    let worker = null;

    // Fast worker initialization
    async function initWorker() {
      if (worker) return;
      worker = Tesseract.createWorker({
        logger: m => {
          if (m.status === 'recognizing text') {
            progressBar.style.width = Math.round(m.progress * 100) + '%';
          }
        }
      });
      await worker.load();
      await worker.loadLanguage('eng');
      await worker.initialize('eng');
      // Optimization: restrict to characters found in Cambridge codes
      await worker.setParameters({
        tessedit_char_whitelist: '0123456789/ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz-',
      });
    }

    function outPaper(scannedString) {
      const p = scannedString.replace(/\//g, '').replace(/\s/g, '').trim();
      let output = 'Paper ' + p[4] + ' Variant ' + p[5];
      const sessionMap = { 'FM': 'March', 'MJ': 'Summer', 'ON': 'Winter' };
      const sessionName = sessionMap[p.substring(6, 8).toUpperCase()] || p.substring(6, 8).toUpperCase();
      return `${output} ${sessionName} 20${p.slice(-2)}`;
    }

    function extractCode(raw) {
      const text = raw.replace(/\s+/g, ' ').trim();
      let m = text.match(/\d{4}\/\d{1,3}\/[A-Za-z]{2}\/\d{2}/) || 
              text.match(/(\d{4})\/(\d{1,3})\/([A-Za-z])\/([A-Za-z])\/(\d{2})/) ||
              text.match(/(\d{4})[\s\/\-](\d{1,3})[\s\/\-]([A-Za-z]{1,2})[\s\/\-]?([A-Za-z]{0,1})[\s\/\-](\d{2})/);
      
      if (!m) return null;
      if (Array.isArray(m) && m.length > 4) {
          return `${m[1]}/${m[2].padStart(2, '0')}/${(m[3]+(m[4]||'')).toUpperCase()}/${m[5]}`;
      }
      return m[0];
    }

    function autoCopy(text) {
      navigator.clipboard.writeText(text).then(() => {
        copyBtn.textContent = '✓ Copied!';
        copyBtn.classList.add('success');
        setTimeout(() => {
          copyBtn.textContent = 'Auto-Copy On';
          copyBtn.classList.remove('success');
        }, 1500);
      });
    }

    async function startCamera() {
      try {
        statusEl.textContent = 'Waking up engine...';
        await initWorker(); // Pre-warm Tesseract
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', width: { ideal: 1280 } }
        });
        video.srcObject = stream;
        document.getElementById('video-container').style.display = 'block';
        startBtn.style.display = 'none';
        captureBtn.style.display = 'inline-block';
        stopBtn.style.display = 'inline-block';
        captureBtn.disabled = false;
        statusEl.textContent = 'Ready';
      } catch (err) {
        statusEl.textContent = 'Error: ' + err.message;
      }
    }

    async function captureAndScan() {
      captureBtn.disabled = true;
      progressWrap.style.display = 'block';
      progressBar.style.width = '0%';
      statusEl.className = 'loading';
      statusEl.textContent = 'Scanning...';

      // Use a smaller crop for faster processing (central area)
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0);

      try {
        const { data: { text } } = await worker.recognize(canvas);
        const code = extractCode(text);
        
        if (code) {
          const finalOutput = outPaper(code);
          rawEl.textContent = code;
          resultEl.textContent = finalOutput;
          statusEl.className = 'success';
          statusEl.textContent = '✅ Found';
          autoCopy(finalOutput); // Automatic Copy
        } else {
          statusEl.className = '';
          statusEl.textContent = '❌ No code seen';
        }
      } catch (err) {
        statusEl.textContent = 'Retry scan';
      }
      progressWrap.style.display = 'none';
      captureBtn.disabled = false;
    }

    function stopCamera() {
      if (stream) stream.getTracks().forEach(t => t.stop());
      document.getElementById('video-container').style.display = 'none';
      startBtn.style.display = 'inline-block';
      captureBtn.style.display = 'none';
      stopBtn.style.display = 'none';
      statusEl.textContent = 'Stopped';
    }
  </script>
</body>
</html>
