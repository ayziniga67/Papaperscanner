<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cambridge Scanner Pro</title>
  <script src="https://unpkg.com/tesseract.js@2.1.5/dist/tesseract.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #31273d;
      --card-bg: #2b2b2b;
      --accent: #7b6f86;
      --accent-active: #a194ad;
      --text-main: #ffffff;
      --text-dim: #b3b3b3;
      --success: #34d399;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .header h1 {
      font-family: 'Oswald', sans-serif;
      font-size: 3.5rem;
      text-transform: uppercase;
      line-height: 1;
      text-align: center;
      letter-spacing: -1px;
    }

    .header p {
      font-size: 1.2rem;
      color: var(--text-main);
      text-align: center;
      margin-top: 10px;
      margin-bottom: 40px;
    }

    #video-wrap {
      width: 100%;
      max-width: 350px;
      height: 220px;
      background: var(--card-bg);
      border-radius: 12px;
      position: relative;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 25px;
      border: 1px solid #444;
    }

    video { width: 100%; height: 100%; object-fit: cover; }

    #aim-box {
      position: absolute;
      width: 85%;
      height: 60px;
      border: 2px solid rgba(255,255,255,0.4);
      border-radius: 8px;
      pointer-events: none;
      box-shadow: 0 0 0 500px rgba(49, 39, 61, 0.5);
    }

    .btn-scan {
      background-color: var(--accent);
      color: white;
      border: none;
      padding: 12px 60px;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 30px;
      transition: all 0.2s;
    }

    .btn-scan:active { transform: scale(0.95); background-color: var(--accent-active); }
    .btn-scan:disabled { opacity: 0.5; }

    .output-card {
      width: 100%;
      max-width: 350px;
      background: var(--card-bg);
      border-radius: 12px;
      padding: 24px;
      position: relative;
      min-height: 180px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    .output-card h2 {
      font-family: 'Oswald', sans-serif;
      font-size: 2.2rem;
      margin-bottom: 15px;
    }

    .auto-copy-toggle {
      position: absolute;
      top: 24px;
      right: 20px;
      background: var(--accent);
      font-size: 0.65rem;
      padding: 6px 12px;
      border-radius: 50px;
      color: white;
      cursor: pointer;
      border: none;
      font-weight: bold;
      text-transform: uppercase;
    }

    .auto-copy-toggle.off {
      background: #444;
      color: #888;
    }

    #result-text {
      font-size: 1.4rem;
      font-weight: bold;
      color: var(--text-main);
      margin-top: 10px;
      line-height: 1.2;
    }

    #status {
      font-size: 0.8rem;
      color: var(--text-dim);
      margin-top: 12px;
    }

    #progress-wrap {
      width: 100%;
      height: 4px;
      background: #111;
      margin-top: 15px;
      border-radius: 2px;
      overflow: hidden;
    }

    #progress-bar {
      height: 100%;
      background: var(--success);
      width: 0%;
      transition: width 0.1s;
    }

    canvas { display: none; }
  </style>
</head>
<body>

  <div class="header">
    <h1>CAMBRIGE IS GAY</h1>
    <p>code ---> simple words</p>
  </div>

  <div id="video-wrap">
    <video id="video" autoplay playsinline muted></video>
    <div id="aim-box"></div>
    <div id="init-overlay" style="position:absolute; z-index:10; background: var(--card-bg); padding: 15px 30px; border-radius:8px; cursor: pointer; font-weight:bold;" onclick="startCamera()">TAP TO START</div>
  </div>

  <button class="btn-scan" id="capture-btn" onclick="captureAndScan()">scan</button>

  <div class="output-card">
    <button class="auto-copy-toggle" id="copy-toggle" onclick="toggleAutoCopy()">auto copy on</button>
    <h2>Output</h2>
    <div id="result-text">xyz</div>
    <div id="status">Engine ready</div>
    <div id="progress-wrap"><div id="progress-bar"></div></div>
  </div>

  <canvas id="canvas"></canvas>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const resultEl = document.getElementById('result-text');
    const statusEl = document.getElementById('status');
    const captureBtn = document.getElementById('capture-btn');
    const progressBar = document.getElementById('progress-bar');
    const copyToggle = document.getElementById('copy-toggle');
    
    let stream = null;
    let worker = null;
    let autoCopyActive = true;

    function toggleAutoCopy() {
      autoCopyActive = !autoCopyActive;
      copyToggle.textContent = autoCopyActive ? 'auto copy on' : 'auto copy off';
      copyToggle.className = autoCopyActive ? 'auto-copy-toggle' : 'auto-copy-toggle off';
    }

    async function initWorker() {
      if (worker) return;
      worker = Tesseract.createWorker({
        logger: m => {
          if (m.status === 'recognizing text') {
            progressBar.style.width = Math.round(m.progress * 100) + '%';
          }
        }
      });
      await worker.load();
      await worker.loadLanguage('eng');
      await worker.initialize('eng');
      await worker.setParameters({
        tessedit_char_whitelist: '0123456789MFJONmfjon/\\-.,;:_[]{}\| ',
      });
    }

    function extractCode(raw) {
      // 1. Clean data to pure Uppercase characters
      const clean = raw.replace(/[^0-9a-zA-Z]/g, '').toUpperCase();
      
      // 2. Logic: Subject(4) Paper(1-8) Variant(1-6) Session(2 chars) Year(2 chars)
      const regex = /(\d{4})([1-8])([1-6])([MFJON]{2})(\d{2})/;
      const m = clean.match(regex);
      
      if (m) {
        const sess = m[4];
        const year = m[5];
        let sName = "";

        // Specific Mapping for Cambridge Sessions
        if (sess === "FM") sName = "March";
        else if (sess === "MJ") sName = "Summer";
        else if (sess === "ON") sName = "Winter";
        else sName = sess; // Fallback to raw if it's weird

        // Year constraint check (20-26)
        if (parseInt(year) < 20 || parseInt(year) > 26) return null;

        return `Paper ${m[2]} Variant ${m[3]} ${sName} 20${year}`;
      }
      return null;
    }

    async function startCamera() {
      try {
        document.getElementById('init-overlay').style.display = 'none';
        await initWorker();
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', width: { ideal: 1280 } }
        });
        video.srcObject = stream;
        statusEl.textContent = 'Ready to scan';
      } catch (err) {
        statusEl.textContent = 'Camera error: ' + err.message;
      }
    }

    async function captureAndScan() {
      if (!stream) return;
      captureBtn.disabled = true;
      statusEl.textContent = 'Scanning...';
      progressBar.style.width = '0%';

      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      
      // Filter for clarity
      ctx.filter = 'grayscale(100%) contrast(300%) brightness(110%)';
      ctx.drawImage(video, 0, 0);
      
      try {
        const { data: { text } } = await worker.recognize(canvas);
        const final = extractCode(text);
        
        if (final) {
          resultEl.textContent = final;
          statusEl.textContent = '✅ Scan complete';
          
          if (autoCopyActive) {
            navigator.clipboard.writeText(final);
            const originalText = copyToggle.textContent;
            copyToggle.textContent = 'COPIED!';
            setTimeout(() => { copyToggle.textContent = originalText; }, 1500);
          }
        } else {
          resultEl.textContent = 'xyz';
          statusEl.textContent = '❌ Invalid code pattern';
        }
      } catch (err) {
        statusEl.textContent = 'Scan failed. Try again.';
      }
      
      captureBtn.disabled = false;
    }
  </script>
</body>
</html>
