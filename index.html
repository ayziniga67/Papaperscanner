<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leakbridge MS-First</title>
  <script src="https://unpkg.com/tesseract.js@4.0.2/dist/tesseract.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #0f172a; --accent: #38bdf8; --card: #1e293b; --text: #ffffff; }
    body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 20px; }
    .container { width: 100%; max-width: 400px; }
    
    .input-card { background: var(--card); padding: 20px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 15px; }
    input { width: 100%; padding: 15px; border-radius: 8px; border: 2px solid #334155; background: #0f172a; color: white; text-align: center; margin-top: 10px; }

    .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; margin-bottom: 10px; }
    .btn-primary { background: var(--accent); color: #0f172a; }
    
    #result-area { display: none; width: 100%; margin-top: 20px; }
    .status-pill { background: rgba(56, 189, 248, 0.2); color: var(--accent); padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
    
    iframe { width: 100%; height: 500px; border-radius: 12px; border: none; background: white; margin-top: 15px; }
    .link-bar { display: flex; gap: 10px; margin: 10px 0; }
    .link-bar a { flex: 1; background: #fff; color: #000; text-align: center; padding: 10px; border-radius: 6px; text-decoration: none; font-weight: 700; font-size: 0.8rem; border: 2px solid var(--accent); }
  </style>
</head>
<body>

<div class="container">
  <div class="input-card">
    <input type="text" id="manual-input" placeholder="9702 M23/12">
    <div id="status" style="text-align:center; font-size:0.8rem; margin-top:10px; opacity:0.6;">Ready</div>
  </div>

  <button class="btn btn-primary" id="go-btn" onclick="masterControl()">OPEN MARK SCHEME</button>
  
  <label class="btn" style="display:block; text-align:center; background:#334155; color:white;">
    SCAN QUESTION PHOTO <input type="file" hidden id="file-in" onchange="processImage(event)">
  </label>

  <div id="result-area">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <span id="paper-label" style="font-weight:600;"></span>
      <span class="status-pill" id="page-status">IDLE</span>
    </div>

    <div class="link-bar">
      <a id="ms-url" target="_blank">MARK SCHEME (NEW TAB)</a>
      <a id="qp-url" target="_blank">VIEW QP</a>
    </div>

    <iframe id="viewer"></iframe>
  </div>
</div>

<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
  
  let detectedText = "";

  // 1. Handle the Photo
  async function processImage(e) {
    const file = e.target.files[0];
    if(!file) return;
    const status = document.getElementById('status');
    status.innerText = "Reading text from image...";
    
    try {
      const worker = await Tesseract.createWorker('eng');
      const { data: { text } } = await worker.recognize(file);
      detectedText = text;
      await worker.terminate(); // Kill worker immediately to save RAM

      status.innerText = "Text captured. Parsing code...";
      // Try to auto-fill the code box
      const m = text.toUpperCase().replace(/\s+/g, '').match(/(\d{4})?.*?([FMSW])(\d{2})\/(\d{1,2})/);
      if(m) document.getElementById('manual-input').value = (m[1]||"") + " " + m[2] + m[3] + "/" + m[4];
      
      status.innerText = "Ready to search.";
    } catch(err) {
      status.innerText = "OCR failed. Enter code manually.";
    }
  }

  // 2. Main Logic Trigger
  function masterControl() {
    const input = document.getElementById('manual-input').value.toUpperCase().replace(/\s+/g, '');
    const m = input.match(/(\d{4})([FMSW])(\d{2})\/(\d{1,2})/);

    if(!m) {
      alert("Please enter code correctly: e.g. 9702 M23/12");
      return;
    }

    const sub = m[1];
    const seas = (m[2]==='M'||m[2]==='F')?'m':(m[2]==='S'?'s':'w');
    const yr = m[3];
    const pap = m[4];

    // Build URLs
    const ms = `https://pastpapers.papacambridge.com/directories/CAIE/CAIE-pastpapers/upload/${sub}_${seas}${yr}_ms_${pap}.pdf`;
    const qp = `https://pastpapers.papacambridge.com/directories/CAIE/CAIE-pastpapers/upload/${sub}_${seas}${yr}_qp_${pap}.pdf`;

    // UI Updates
    document.getElementById('result-area').style.display = 'block';
    document.getElementById('paper-label').innerText = `${sub} P${pap} ${m[2]}${yr}`;
    document.getElementById('ms-url').href = ms;
    document.getElementById('qp-url').href = qp;
    
    // Load MARK SCHEME in the viewer (User's primary goal)
    document.getElementById('viewer').src = `https://docs.google.com/viewer?url=${encodeURIComponent(ms)}&embedded=true`;

    // Start background search if we have question text
    if(detectedText) {
      runDeepSearch(qp, ms, detectedText);
    } else {
      document.getElementById('page-status').innerText = "MANUAL BROWSE";
    }
  }

  // 3. The "Deep Search" Logic
  async function runDeepSearch(qpUrl, msUrl, text) {
    const statusEl = document.getElementById('page-status');
    statusEl.innerText = "SEARCHING PAGES...";
    
    try {
      const proxy = `https://corsproxy.io/?${encodeURIComponent(qpUrl)}`;
      const pdf = await pdfjsLib.getDocument(proxy).promise;
      
      // Filter for unique technical keywords
      const keys = text.toLowerCase()
                      .replace(/[^a-z ]/g, '')
                      .split(' ')
                      .filter(w => w.length > 5)
                      .slice(0, 4);

      if(keys.length === 0) {
        statusEl.innerText = "TEXT TOO SHORT";
        return;
      }

      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        const pageText = content.items.map(s => s.str).join(' ').toLowerCase();
        
        // If 2 or more keys match, we found the page
        const matches = keys.filter(k => pageText.includes(k)).length;
        if (matches >= 2) {
          statusEl.innerText = "MATCH: PAGE " + i;
          // Redirect the internal viewer to the specific MS page
          const jumpLink = `https://docs.google.com/viewer?url=${encodeURIComponent(msUrl)}&embedded=true#page=${i}`;
          document.getElementById('viewer').src = jumpLink;
          return;
        }
      }
      statusEl.innerText = "NO PAGE MATCH";
    } catch(e) {
      statusEl.innerText = "SEARCH BLOCKED";
    }
  }
</script>

</body>
</html>
