<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>leakbridge papers - Fixed</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root { --bg-color: #1a2a3a; --card-bg: #004d4d; --text-main: #ffffff; --progress-bg: #4a5a6a; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Outfit', sans-serif; background-color: var(--bg-color); color: var(--text-main); display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 40px 20px; }
    .header { text-align: center; margin-bottom: 20px; }
    #video-wrap { width: 100%; max-width: 340px; height: 220px; background: var(--card-bg); border-radius: 15px; position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }
    video, #uploaded-img { width: 100%; height: 100%; object-fit: cover; display: none; }
    #uploaded-img { object-fit: contain; background: #0b1926; }
    #aim-box { position: absolute; width: 85%; height: 50px; border: 2px solid #ffffff; border-radius: 10px; pointer-events: none; z-index: 5; }
    .action-row { display: flex; gap: 8px; margin-bottom: 30px; width: 100%; max-width: 340px; }
    .btn-action { background: transparent; color: white; border: 1.5px solid #ffffff; padding: 12px 0; border-radius: 6px; font-size: 0.9rem; cursor: pointer; flex: 1; text-align: center; }
    .output-section { width: 100%; max-width: 340px; }
    .section-group { background: rgba(0, 77, 77, 0.4); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #ffffff; position: relative; }
    .section-title { font-size: 0.75rem; text-transform: uppercase; opacity: 0.6; margin-bottom: 10px; display: block; }
    #result-text { font-size: 1.1rem; font-weight: 600; display: block; }
    .pdf-btn { display: none; background: #ffffff; color: #004d4d; padding: 12px; text-align: center; border-radius: 8px; text-decoration: none; font-weight: 700; margin-top: 5px; }
    .progress-container { width: 100%; height: 2px; background: var(--progress-bg); margin-top: 10px; }
    #bar { height: 100%; background: #ffffff; width: 0%; transition: width 0.2s; }
    canvas { display: none; }
  </style>
</head>
<body>

  <div class="header">
    <h1>PAPER SCANNER</h1>
    <h2>Cambridge Past Paper Finder</h2>
  </div>

  <div id="video-wrap">
    <video id="video" autoplay playsinline muted></video>
    <img id="uploaded-img">
    <div id="aim-box"></div>
  </div>

  <div class="action-row">
    <button class="btn-action" id="main-btn" onclick="handleFlow()">Scan</button>
    <label class="btn-action" for="file-upload">Upload</label>
    <input type="file" id="file-upload" accept="image/*" style="display: none;" onchange="handleFileUpload(event)">
  </div>

  <div class="output-section">
    <div class="section-group">
      <span class="section-title">Result</span>
      <span id="subject-display">Subject: ----</span>
      <span id="result-text">Ready...</span>
    </div>
    <div class="section-group">
      <a id="pdf-link" class="pdf-btn" target="_blank">OPEN PDF</a>
    </div>
    <div class="progress-container"><div id="bar"></div></div>
  </div>

  <canvas id="canvas"></canvas>

  <script>
    const video = document.getElementById('video');
    const uploadedImg = document.getElementById('uploaded-img');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const resultEl = document.getElementById('result-text');
    const subjectEl = document.getElementById('subject-display');
    const pdfLink = document.getElementById('pdf-link');
    const mainBtn = document.getElementById('main-btn');
    const bar = document.getElementById('bar');
    
    let stream = null, worker = null, isCameraOn = false, currentMode = 'camera';

    // FIX 1 & 4: Tesseract v5 Syntax + Better Memory Management
    async function initWorker() {
      if (worker) return;
      resultEl.textContent = "Initializing Engine...";
      worker = await Tesseract.createWorker('eng', 1, {
        logger: m => { if(m.status === 'recognizing text') bar.style.width = (m.progress * 100) + '%'; }
      });
      await worker.setParameters({ tessedit_char_whitelist: '0123456789MSWQPmswqp/_ ' });
    }

    // FIX 2: Improved Session Mapping
    function getSessionInfo(char) {
      const c = char.toUpperCase();
      if (c === 'M' || c === 'F') return { code: 'm', name: 'March' };
      if (c === 'S' || c === 'J') return { code: 's', name: 'Summer' };
      if (c === 'W' || c === 'N' || c === 'O') return { code: 'w', name: 'Winter' };
      return { code: 's', name: 'Summer' }; 
    }

    function parseCode(text) {
      const clean = text.toUpperCase().replace(/[^A-Z0-9_]/g, ' ').trim();
      let sub = "9709", pap = "", varnt = "", seas = "s", yr = "", type = "ms";

      const mUnder = clean.match(/(\d{4})?_?([MSW])(\d{2})_(QP|MS)_(\d)(\d)/);
      const mSlash = clean.match(/(\d{4})?\s*([1-8])\s*([1-6])\s*([MFJONS])\s*([MFJONS])?\s*(\d{2})/);

      if (mUnder) {
        sub = mUnder[1] || sub;
        const sess = getSessionInfo(mUnder[2]);
        seas = sess.code; yr = mUnder[3]; type = mUnder[4].toLowerCase(); pap = mUnder[5]; varnt = mUnder[6];
      } else if (mSlash) {
        sub = mSlash[1] || sub;
        pap = mSlash[2]; varnt = mSlash[3];
        const sess = getSessionInfo(mSlash[4]);
        seas = sess.code; yr = mSlash[6];
      }

      if (yr) {
        const typeName = (type === 'qp') ? "Question Paper" : "Mark Scheme";
        const sName = getSessionInfo(seas).name;
        resultEl.textContent = `${typeName} P${pap} V${varnt} ${sName} 20${yr}`;
        subjectEl.textContent = `Subject: ${sub}`;
        pdfLink.href = `https://pastpapers.papacambridge.com/directories/CAIE/CAIE-pastpapers/upload/${sub}_${seas}${yr}_${type}_${pap}${varnt}.pdf`;
        pdfLink.style.display = 'block';
      } else {
        resultEl.textContent = "Couldn't detect code clearly.";
      }
    }

    async function stopCamera() {
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
      }
      isCameraOn = false;
    }

    async function handleFlow() {
      if (currentMode === 'camera' && !isCameraOn) {
        try {
          stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 1920 } } });
          video.srcObject = stream;
          video.style.display = 'block';
          uploadedImg.style.display = 'none';
          isCameraOn = true;
          mainBtn.textContent = "Scan Now";
        } catch(e) { alert("Camera access denied."); }
      } else {
        await initWorker();
        scan();
      }
    }

    function handleFileUpload(event) {
      if (event.target.files[0]) {
        stopCamera();
        const url = URL.createObjectURL(event.target.files[0]);
        uploadedImg.src = url;
        uploadedImg.style.display = 'block';
        video.style.display = 'none';
        currentMode = 'image';
        mainBtn.textContent = "Scan Uploaded Image";
      }
    }

    async function scan() {
      mainBtn.disabled = true;
      const source = currentMode === 'image' ? uploadedImg : video;
      
      // FIX 5: Canvas Scaling
      canvas.width = (currentMode === 'image') ? source.naturalWidth : source.videoWidth;
      canvas.height = (currentMode === 'image') ? source.naturalHeight : source.videoHeight;
      
      ctx.filter = 'grayscale(100%) contrast(250%) brightness(110%)';
      ctx.drawImage(source, 0, 0, canvas.width, canvas.height);
      
      const { data: { text } } = await worker.recognize(canvas);
      parseCode(text);
      mainBtn.disabled = false;
      bar.style.width = '0%';
    }
  </script>
</body>
</html>
