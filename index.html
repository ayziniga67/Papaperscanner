<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cambridge Scanner Pro</title>
  <script src="https://unpkg.com/tesseract.js@2.1.5/dist/tesseract.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #31273d;
      --card-bg: #2b2b2b;
      --accent: #7b6f86;
      --text-main: #ffffff;
      --text-dim: #b3b3b3;
      --success: #34d399;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 40px 20px;
    }

    /* Header Section */
    .header h1 {
      font-family: 'Oswald', sans-serif;
      font-size: 3.5rem;
      text-transform: uppercase;
      line-height: 1;
      text-align: center;
      letter-spacing: -1px;
    }

    .header p {
      font-size: 1.2rem;
      color: var(--text-main);
      text-align: center;
      margin-top: 10px;
      margin-bottom: 40px;
    }

    /* Camera Container */
    #video-wrap {
      width: 100%;
      max-width: 350px;
      height: 220px;
      background: var(--card-bg);
      border-radius: 12px;
      position: relative;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 25px;
    }

    video { width: 100%; height: 100%; object-fit: cover; }

    #aim-box {
      position: absolute;
      width: 85%;
      height: 60px;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 8px;
      pointer-events: none;
    }

    /* Scan Button */
    .btn-scan {
      background-color: var(--accent);
      color: white;
      border: none;
      padding: 12px 45px;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 30px;
      transition: opacity 0.2s;
    }

    .btn-scan:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Output Section */
    .output-card {
      width: 100%;
      max-width: 350px;
      background: var(--card-bg);
      border-radius: 12px;
      padding: 20px;
      position: relative;
      min-height: 180px;
    }

    .output-card h2 {
      font-family: 'Oswald', sans-serif;
      font-size: 2.2rem;
      margin-bottom: 15px;
    }

    .auto-copy-tag {
      position: absolute;
      top: 20px;
      right: 20px;
      background: var(--accent);
      font-size: 0.65rem;
      padding: 4px 10px;
      border-radius: 50px;
      color: white;
    }

    #result-text {
      font-size: 1.5rem;
      font-weight: bold;
      color: var(--text-main);
      margin-top: 10px;
    }

    #status {
      font-size: 0.8rem;
      color: var(--text-dim);
      margin-top: 8px;
    }

    #progress-bar {
      height: 4px;
      background: var(--success);
      width: 0%;
      margin-top: 10px;
      transition: width 0.1s;
    }

    canvas { display: none; }
  </style>
</head>
<body>

  <div class="header">
    <h1>CAMBRIGE IS GAY</h1>
    <p>code ---> simple words</p>
  </div>

  <div id="video-wrap">
    <video id="video" autoplay playsinline muted></video>
    <div id="aim-box"></div>
    <div id="init-overlay" style="position:absolute; background: var(--card-bg); padding: 10px; cursor: pointer;" onclick="startCamera()">Tap to Start Camera</div>
  </div>

  <button class="btn-scan" id="capture-btn" onclick="captureAndScan()">scan</button>

  <div class="output-card">
    <div class="auto-copy-tag" id="copy-tag">auto copy on</div>
    <h2>Output</h2>
    <div id="result-text">xyz</div>
    <div id="status">Engine ready</div>
    <div id="progress-bar"></div>
  </div>

  <canvas id="canvas"></canvas>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const resultEl = document.getElementById('result-text');
    const statusEl = document.getElementById('status');
    const captureBtn = document.getElementById('capture-btn');
    const progressBar = document.getElementById('progress-bar');
    const copyTag = document.getElementById('copy-tag');
    
    let stream = null;
    let worker = null;

    async function initWorker() {
      if (worker) return;
      worker = Tesseract.createWorker({
        logger: m => {
          if (m.status === 'recognizing text') {
            progressBar.style.width = Math.round(m.progress * 100) + '%';
          }
        }
      });
      await worker.load();
      await worker.loadLanguage('eng');
      await worker.initialize('eng');
      await worker.setParameters({
        tessedit_char_whitelist: '0123456789MFJONmfjon/\\-.,;:_[]{}\| ',
      });
    }

    function extractCode(raw) {
      const clean = raw.replace(/[^0-9a-zA-Z]/g, '').toUpperCase();
      const regex = /(\d{4})([1-8])([1-6])([MFJON]{1,4})(2[0-6])/;
      const m = clean.match(regex);
      if (m) {
        const sess = m[4];
        let sName = sess;
        if (/[FM]/.test(sess)) sName = 'March';
        else if (/[MJ]/.test(sess)) sName = 'Summer';
        else if (/[ON]/.test(sess)) sName = 'Winter';
        return `Paper ${m[2]} Variant ${m[3]} ${sName} 20${m[5]}`;
      }
      return null;
    }

    async function startCamera() {
      try {
        document.getElementById('init-overlay').style.display = 'none';
        await initWorker();
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', width: { ideal: 1280 } }
        });
        video.srcObject = stream;
        statusEl.textContent = 'Camera ready';
      } catch (err) {
        statusEl.textContent = 'Error: ' + err.message;
      }
    }

    async function captureAndScan() {
      if (!stream) return;
      captureBtn.disabled = true;
      statusEl.textContent = 'Scanning...';

      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.filter = 'grayscale(100%) contrast(250%)';
      ctx.drawImage(video, 0, 0);
      
      try {
        const { data: { text } } = await worker.recognize(canvas);
        const final = extractCode(text);
        
        if (final) {
          resultEl.textContent = final;
          statusEl.textContent = '✅ Success';
          navigator.clipboard.writeText(final);
          copyTag.textContent = 'copied!';
          setTimeout(() => { copyTag.textContent = 'auto copy on'; }, 2000);
        } else {
          resultEl.textContent = 'xyz';
          statusEl.textContent = '❌ Try moving closer';
        }
      } catch (err) {
        statusEl.textContent = 'Scanner error';
      }
      
      captureBtn.disabled = false;
      progressBar.style.width = '0%';
    }
  </script>
</body>
</html>
