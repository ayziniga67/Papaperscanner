<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cambridge Scanner Pro</title>
  <script src="https://unpkg.com/tesseract.js@2.1.5/dist/tesseract.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #1a2a3a;
      --card-bg: #004d4d;
      --text-main: #ffffff;
      --accent-teal: #006666;
      --progress-bg: #4a5a6a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 50px 20px;
    }

    .header { text-align: center; margin-bottom: 30px; }
    .header h1 {
      font-family: 'Montserrat', sans-serif;
      font-size: 2.2rem;
      font-weight: 400;
      letter-spacing: 2px;
      margin-bottom: 5px;
    }
    .header p { font-size: 0.9rem; opacity: 0.8; font-weight: 300; }

    #video-wrap {
      width: 100%;
      max-width: 340px;
      height: 240px;
      background: var(--card-bg);
      border-radius: 15px;
      position: relative;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 25px;
    }

    video { width: 100%; height: 100%; object-fit: cover; display: none; }
    
    /* New element to display uploaded/pasted images */
    #uploaded-img { width: 100%; height: 100%; object-fit: contain; display: none; background: #0b1926; }

    #aim-box {
      position: absolute;
      width: 80%;
      height: 55px;
      border: 2px solid #ffffff;
      border-radius: 10px;
      pointer-events: none;
      z-index: 5;
    }

    /* Grouped Action Buttons */
    .action-row {
      display: flex;
      gap: 15px;
      margin-bottom: 40px;
      width: 100%;
      max-width: 340px;
      justify-content: center;
    }

    .btn-action {
      background: transparent;
      color: white;
      border: 1.5px solid #ffffff;
      padding: 10px 30px;
      border-radius: 10px;
      font-size: 1.1rem;
      font-family: 'Outfit', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      flex: 1;
      text-align: center;
    }
    
    .btn-action:active { background: rgba(255,255,255,0.1); transform: scale(0.96); }
    .btn-action:disabled { opacity: 0.5; cursor: not-allowed; }

    .output-section { width: 100%; max-width: 340px; position: relative; }

    .output-section h2 {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.8rem;
      margin-bottom: 10px;
    }

    .output-box {
      width: 100%;
      background: linear-gradient(90deg, #004d4d 0%, #1a2a3a 100%);
      padding: 15px;
      border-radius: 8px;
      font-size: 1.1rem;
      color: #ffffff;
      min-height: 50px;
      display: flex;
      align-items: center;
      box-shadow: inset 0 0 15px rgba(0, 255, 255, 0.1);
    }

    .copy-status-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 10px;
    }

    .toggle-btn {
      background: transparent;
      border: 1px solid #ffffff;
      color: white;
      padding: 5px 12px;
      border-radius: 12px;
      font-size: 0.7rem;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      transition: opacity 0.3s;
    }

    .toggle-btn.off { opacity: 0.4; border-color: rgba(255,255,255,0.5); }

    .progress-container {
      width: 100%;
      height: 2px;
      background: var(--progress-bg);
      margin-top: 10px;
    }
    #bar { height: 100%; background: #ffffff; width: 0%; transition: width 0.1s; }
    .progress-label { font-size: 0.7rem; margin-top: 5px; opacity: 0.7; }

    canvas { display: none; }
  </style>
</head>
<body>

  <div class="header">
    <h1>CAMBRIGE IS GAY</h1>
    <p>idk man how i created ts it happened</p>
  </div>

  <div id="video-wrap">
    <video id="video" autoplay playsinline muted></video>
    <img id="uploaded-img" alt="Uploaded paper code preview">
    <div id="aim-box"></div>
    <div id="loading-msg">Camera Off (Paste Image to Scan)</div>
  </div>

  <div class="action-row">
    <button class="btn-action" id="main-btn" onclick="handleFlow()">scan</button>
    <label class="btn-action" for="file-upload" style="cursor: pointer;">upload</label>
    <input type="file" id="file-upload" accept="image/*" style="display: none;" onchange="handleFileUpload(event)">
  </div>

  <div class="output-section">
    <h2>Output</h2>
    <div class="output-box" id="result-text">output here</div>
    
    <div class="copy-status-row">
      <button class="toggle-btn off" id="copy-toggle" onclick="toggleCopy()">auto copy off</button>
    </div>

    <div class="progress-container"><div id="bar"></div></div>
    <p class="progress-label">progress bar</p>
  </div>

  <canvas id="canvas"></canvas>

  <script>
    const video = document.getElementById('video');
    const uploadedImg = document.getElementById('uploaded-img');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const resultEl = document.getElementById('result-text');
    const mainBtn = document.getElementById('main-btn');
    const bar = document.getElementById('bar');
    const copyToggle = document.getElementById('copy-toggle');
    const aimBox = document.getElementById('aim-box');
    
    let stream = null;
    let worker = null;
    let isCameraOn = false;
    let currentMode = 'camera'; // 'camera' or 'image'
    let autoCopy = false;

    // Listen for Paste events anywhere on the page
    window.addEventListener('paste', e => {
      const items = (e.clipboardData || e.originalEvent.clipboardData).items;
      for (let index in items) {
        const item = items[index];
        if (item.kind === 'file') {
          const blob = item.getAsFile();
          processImageFile(blob);
        }
      }
    });

    function toggleCopy() {
      autoCopy = !autoCopy;
      if (autoCopy) {
        copyToggle.textContent = 'auto copy on';
        copyToggle.classList.remove('off');
      } else {
        copyToggle.textContent = 'auto copy off';
        copyToggle.classList.add('off');
      }
    }

    function handleFileUpload(event) {
      const file = event.target.files[0];
      if (!file) return;
      processImageFile(file);
    }

    function processImageFile(blob) {
      const url = URL.createObjectURL(blob);
      uploadedImg.src = url;
      uploadedImg.onload = () => {
        // Stop camera if running
        if (stream) { stream.getTracks().forEach(t => t.stop()); isCameraOn = false; }
        
        video.style.display = 'none';
        uploadedImg.style.display = 'block';
        document.getElementById('loading-msg').style.display = 'none';
        aimBox.style.display = 'none'; // Hide aim box for images
        
        currentMode = 'image';
        mainBtn.textContent = "scan image";
      }
    }

    async function handleFlow() {
      if (currentMode === 'camera' && !isCameraOn) {
        mainBtn.textContent = "starting...";
        await initWorker();
        try {
          stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: 'environment', width: { ideal: 1280 } } 
          });
          video.srcObject = stream;
          video.style.display = 'block';
          uploadedImg.style.display = 'none';
          document.getElementById('loading-msg').style.display = 'none';
          aimBox.style.display = 'block';
          isCameraOn = true;
          mainBtn.textContent = "scan";
        } catch (e) { alert("Camera access denied"); mainBtn.textContent = "scan"; }
      } else {
        await initWorker(); // Ensure worker is loaded if they pasted an image before starting camera
        scan();
      }
    }

    async function initWorker() {
      if (worker) return;
      worker = Tesseract.createWorker({
        logger: m => { if(m.status === 'recognizing text') bar.style.width = (m.progress * 100) + '%'; }
      });
      await worker.load();
      await worker.loadLanguage('eng');
      await worker.initialize('eng');
      await worker.setParameters({ tessedit_char_whitelist: '0123456789MFJONmfjon/\\-.,;:_[]{}\| ' });
    }

    function scan() {
      mainBtn.disabled = true;
      
      // Determine what to draw to the canvas
      if (currentMode === 'image') {
        canvas.width = uploadedImg.naturalWidth;
        canvas.height = uploadedImg.naturalHeight;
        ctx.filter = 'grayscale(100%) contrast(300%) brightness(110%)';
        ctx.drawImage(uploadedImg, 0, 0);
      } else if (isCameraOn) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.filter = 'grayscale(100%) contrast(300%) brightness(110%)';
        ctx.drawImage(video, 0, 0);
      } else {
        mainBtn.disabled = false;
        return;
      }
      
      worker.recognize(canvas).then(({ data: { text } }) => {
        const clean = text.replace(/[^0-9a-zA-Z]/g, '').toUpperCase();
        const m = clean.match(/(\d{4})([1-8])([1-6])([MFJON]{1,4})(\d{2})/);
        
        if (m) {
          let s = m[4];
          let sName = "";
          
          if (s.includes('J')) sName = "Summer";
          else if (s.includes('O') || s.includes('N')) sName = "Winter";
          else sName = "March";

          const res = `Paper ${m[2]} Variant ${m[3]} ${sName} 20${m[5]}`;
          resultEl.textContent = res;
          
          if(autoCopy) {
            navigator.clipboard.writeText(res).then(() => {
                const originalText = copyToggle.textContent;
                copyToggle.textContent = 'COPIED!';
                setTimeout(() => { copyToggle.textContent = originalText; }, 1000);
            });
          }
        } else {
          resultEl.textContent = "No code found";
        }
        mainBtn.disabled = false;
        bar.style.width = '0%';
      });
    }
  </script>
</body>
</html>
