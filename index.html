<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leakbridge - Direct Access</title>
  <script src="https://unpkg.com/tesseract.js@4.0.2/dist/tesseract.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #0f172a; --accent: #38bdf8; --card: #1e293b; --text: #ffffff; }
    body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 20px; }
    .container { width: 100%; max-width: 400px; }
    
    /* Input Area */
    .input-card { background: var(--card); padding: 20px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
    input { width: 100%; padding: 15px; border-radius: 8px; border: 2px solid #334155; background: #0f172a; color: white; font-size: 1rem; text-align: center; margin-top: 10px; transition: 0.3s; }
    input:focus { border-color: var(--accent); outline: none; }

    /* Action Buttons */
    .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; margin-bottom: 10px; transition: 0.2s; }
    .btn-primary { background: var(--accent); color: #0f172a; }
    .btn-secondary { background: transparent; border: 1px solid #334155; color: white; }
    .btn:active { transform: scale(0.98); }

    /* Result Section */
    #result-area { display: none; margin-top: 20px; animation: slideUp 0.4s ease; }
    .badge { background: var(--accent); color: #000; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: 800; }
    iframe { width: 100%; height: 500px; border-radius: 12px; border: none; background: white; margin-top: 15px; }

    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    #status { font-size: 0.8rem; opacity: 0.6; text-align: center; margin: 10px; }
  </style>
</head>
<body>

<div class="container">
  <div class="input-card">
    <label style="font-size: 0.7rem; font-weight: 600; opacity: 0.5;">MANUAL OVERRIDE / DETECTION</label>
    <input type="text" id="manual-input" placeholder="Enter Code (e.g. 9702 M23/12)">
    <div id="status">Waiting for input or photo...</div>
  </div>

  <div class="btn-row">
    <button class="btn btn-primary" onclick="handleLogic()">FIND PAPER NOW</button>
    <label class="btn btn-secondary" style="display:block; text-align:center;">
      UPLOAD PHOTO <input type="file" hidden id="file-in" onchange="processFile(event)">
    </label>
  </div>

  <div id="result-area">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <span id="res-title" style="font-weight:600;">PAPER FOUND</span>
      <span class="badge" id="res-page">SCANNING PAGES...</span>
    </div>
    <div style="display:flex; gap: 10px; margin-top: 10px;">
      <a id="ms-link" target="_blank" style="flex:1; background:white; color:black; text-align:center; padding:10px; border-radius:6px; text-decoration:none; font-weight:700; font-size:0.8rem;">MS PDF</a>
      <a id="qp-link" target="_blank" style="flex:1; background:white; color:black; text-align:center; padding:10px; border-radius:6px; text-decoration:none; font-weight:700; font-size:0.8rem;">QP PDF</a>
    </div>
    <iframe id="viewer"></iframe>
  </div>
</div>

<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
  
  let ocrResult = "";

  async function processFile(e) {
    const file = e.target.files[0];
    if(!file) return;
    document.getElementById('status').innerText = "Analyzing photo...";
    
    const worker = await Tesseract.createWorker('eng');
    const { data: { text } } = await worker.recognize(file);
    ocrResult = text;
    await worker.terminate();
    
    document.getElementById('status').innerText = "Photo read. Click Find Paper.";
    // Auto-fill if it finds a code
    const m = text.toUpperCase().replace(/\s+/g, '').match(/(\d{4})?.*?([FMSW])(\d{2})\/(\d{1,2})/);
    if(m) document.getElementById('manual-input').value = (m[1]||"") + " " + m[2] + m[3] + "/" + m[4];
  }

  function handleLogic() {
    const manual = document.getElementById('manual-input').value.toUpperCase().replace(/\s+/g, '');
    const status = document.getElementById('status');
    
    // Regex for: Subject(4) Session(1) Year(2) / Paper(2)
    const m = manual.match(/(\d{4})([FMSW])(\d{2})\/(\d{1,2})/);

    if (m) {
      const sub = m[1];
      const seas = (m[2]==='M'||m[2]==='F')?'m':(m[2]==='S'?'s':'w');
      const yr = m[3];
      const pap = m[4];
      
      status.innerText = "Connecting to repository...";
      loadPaper(sub, seas, yr, pap);
    } else {
      status.innerText = "Format Error. Use: 9702 M23/12";
      document.getElementById('manual-input').style.borderColor = "red";
    }
  }

  function loadPaper(sub, seas, yr, pap) {
    const qp = `https://pastpapers.papacambridge.com/directories/CAIE/CAIE-pastpapers/upload/${sub}_${seas}${yr}_qp_${pap}.pdf`;
    const ms = `https://pastpapers.papacambridge.com/directories/CAIE/CAIE-pastpapers/upload/${sub}_${seas}${yr}_ms_${pap}.pdf`;

    document.getElementById('result-area').style.display = 'block';
    document.getElementById('res-title').innerText = `${sub} | ${yr} | P${pap}`;
    document.getElementById('ms-link').href = ms;
    document.getElementById('qp-link').href = qp;
    
    // Direct embed via Google Viewer (Most reliable for mobile)
    document.getElementById('viewer').src = `https://docs.google.com/viewer?url=${encodeURIComponent(qp)}&embedded=true`;
    
    // Deep Search (only if OCR text exists)
    if(ocrResult) {
       deepSearch(qp, ocrResult);
    } else {
       document.getElementById('res-page').innerText = "MANUAL MODE";
    }
  }

  async function deepSearch(url, text) {
    try {
      const proxy = `https://corsproxy.io/?${encodeURIComponent(url)}`;
      const pdf = await pdfjsLib.getDocument(proxy).promise;
      const keys = text.toLowerCase().match(/\b(\w{5,})\b/g).slice(0, 5); // Pick 5 long words
      
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        const full = content.items.map(s => s.str).join(' ').toLowerCase();
        if (keys.every(k => full.includes(k))) {
          document.getElementById('res-page').innerText = "FOUND ON PAGE " + i;
          return;
        }
      }
      document.getElementById('res-page').innerText = "PAGE NOT FOUND";
    } catch(e) {
      document.getElementById('res-page').innerText = "SEARCH BLOCKED";
    }
  }
</script>

</body>
</html>
