<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cambridge Scanner Pro</title>
  <script src="https://unpkg.com/tesseract.js@2.1.5/dist/tesseract.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #1a2a3a;
      --card-bg: #004d4d;
      --text-main: #ffffff;
      --accent-teal: #006666;
      --progress-bg: #4a5a6a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 50px 20px;
    }

    .header { text-align: center; margin-bottom: 30px; }
    .header h1 {
      font-family: 'Montserrat', sans-serif;
      font-size: 2.2rem;
      font-weight: 400;
      letter-spacing: 2px;
      margin-bottom: 5px;
    }
    .header p { font-size: 0.9rem; opacity: 0.8; font-weight: 300; }

    #video-wrap {
      width: 100%;
      max-width: 340px;
      height: 240px;
      background: var(--card-bg);
      border-radius: 15px;
      position: relative;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 25px;
    }

    video { width: 100%; height: 100%; object-fit: cover; display: none; }
    
    #uploaded-img { width: 100%; height: 100%; object-fit: contain; display: none; background: #0b1926; }

    #aim-box {
      position: absolute;
      width: 80%;
      height: 55px;
      border: 2px solid #ffffff;
      border-radius: 10px;
      pointer-events: none;
      z-index: 5;
    }

    .action-row {
      display: flex;
      gap: 10px;
      margin-bottom: 40px;
      width: 100%;
      max-width: 340px;
      justify-content: space-between;
    }

    .btn-action {
      background: transparent;
      color: white;
      border: 1.5px solid #ffffff;
      padding: 10px 0;
      border-radius: 10px;
      font-size: 1rem;
      font-family: 'Outfit', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      flex: 1;
      text-align: center;
    }
    
    .btn-action:active { background: rgba(255,255,255,0.1); transform: scale(0.96); }
    .btn-action:disabled { opacity: 0.5; cursor: not-allowed; }

    .output-section { width: 100%; max-width: 340px; position: relative; }

    .output-section h2 {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.8rem;
      margin-bottom: 10px;
    }

    .output-box {
      width: 100%;
      background: linear-gradient(90deg, #004d4d 0%, #1a2a3a 100%);
      padding: 15px;
      border-radius: 8px;
      font-size: 1.1rem;
      color: #ffffff;
      min-height: 50px;
      display: flex;
      align-items: center;
      box-shadow: inset 0 0 15px rgba(0, 255, 255, 0.1);
    }

    .copy-status-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 10px;
    }

    .toggle-btn {
      background: transparent;
      border: 1px solid #ffffff;
      color: white;
      padding: 5px 12px;
      border-radius: 12px;
      font-size: 0.7rem;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      transition: opacity 0.3s;
    }

    .toggle-btn.off { opacity: 0.4; border-color: rgba(255,255,255,0.5); }

    .progress-container {
      width: 100%;
      height: 2px;
      background: var(--progress-bg);
      margin-top: 10px;
    }
    #bar { height: 100%; background: #ffffff; width: 0%; transition: width 0.1s; }
    .progress-label { font-size: 0.7rem; margin-top: 5px; opacity: 0.7; }

    canvas { display: none; }
  </style>
</head>
<body>

  <div class="header">
    <h1>CAMBRIGE IS GAY</h1>
    <p>idk man how i created ts it happened</p>
  </div>

  <div id="video-wrap">
    <video id="video" autoplay playsinline muted></video>
    <img id="uploaded-img" alt="Uploaded paper code preview">
    <div id="aim-box"></div>
    <div id="loading-msg">Camera Off</div>
  </div>

  <div class="action-row">
    <button class="btn-action" id="main-btn" onclick="handleFlow()">scan</button>
    <label class="btn-action" for="file-upload" style="cursor: pointer; display: flex; align-items: center; justify-content: center;">upload</label>
    <input type="file" id="file-upload" accept="image/*" style="display: none;" onchange="handleFileUpload(event)">
    <button class="btn-action" onclick="handleManualPaste()">paste</button>
  </div>

  <div class="output-section">
    <h2>Output</h2>
    <div class="output-box" id="result-text">output here</div>
    
    <div class="copy-status-row">
      <button class="toggle-btn off" id="copy-toggle" onclick="toggleCopy()">auto copy off</button>
    </div>

    <div class="progress-container"><div id="bar"></div></div>
    <p class="progress-label">progress bar</p>
  </div>

  <canvas id="canvas"></canvas>

  <script>
    const video = document.getElementById('video');
    const uploadedImg = document.getElementById('uploaded-img');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const resultEl = document.getElementById('result-text');
    const mainBtn = document.getElementById('main-btn');
    const bar = document.getElementById('bar');
    const copyToggle = document.getElementById('copy-toggle');
    const aimBox = document.getElementById('aim-box');
    
    let stream = null;
    let worker = null;
    let isCameraOn = false;
    let currentMode = 'camera'; 
    let autoCopy = false;

    function parseCode(text) {
      const clean = text.toUpperCase().trim();
      
      // Pattern 1: Modern format (9709/52/F/M/20)
      const mNew = clean.match(/(\d{4})\s*(\d)\s*(\d)\s*([MFJON0](?:\s*[MFJON0]){0,3})\s*(?:20)?(\d{2})/);
      
      // Pattern 2: Legacy format (9709/01/O/N/04)
      const mOld = clean.match(/(\d{4})\s*0(\d)\s*([MFJON0](?:\s*[MFJON0]){0,3})\s*(?:20)?(\d{2})/);
      
      // Pattern 3: Filename format (m25_qp_12) - SeasonYear_Type_PaperVariant
      // Group 1: M/S/W | Group 2: Year | Group 3: qp/ms | Group 4: Paper | Group 5: Variant
      const mFile = clean.match(/([MSW])(\d{2})_(?:QP|MS)_(\d)(\d)/);

      let res = "";

      if (mNew) {
        let s = mNew[4].replace(/\s+/g, '');
        let sName = s.includes('J') ? "Summer" : ((s.includes('O') || s.includes('N') || s.includes('0')) ? "Winter" : "March");
        res = `Paper ${mNew[2]} Variant ${mNew[3]} ${sName} 20${mNew[5]}`;
      } 
      else if (mOld) {
        let s = mOld[3].replace(/\s+/g, '');
        let sName = s.includes('J') ? "Summer" : ((s.includes('O') || s.includes('N') || s.includes('0')) ? "Winter" : "March");
        res = `Paper ${mOld[2]} ${sName} 20${mOld[4]}`;
      }
      else if (mFile) {
        let sLetter = mFile[1];
        let sName = sLetter === 'M' ? "March" : (sLetter === 'S' ? "Summer" : "Winter");
        res = `Paper ${mFile[3]} Variant ${mFile[4]} ${sName} 20${mFile[2]}`;
      }
      
      if (res) {
        resultEl.textContent = res;
        if(autoCopy) {
          navigator.clipboard.writeText(res).then(() => {
              const originalText = copyToggle.textContent;
              copyToggle.textContent = 'COPIED!';
              setTimeout(() => { copyToggle.textContent = originalText; }, 1000);
          });
        }
      } else {
        resultEl.textContent = "No valid code found";
      }
    }

    window.addEventListener('paste', e => {
      const clipboardData = e.clipboardData || window.clipboardData;
      const pastedText = clipboardData.getData('Text');
      if (pastedText && pastedText.trim() !== '') {
        parseCode(pastedText);
        return; 
      }
      const items = clipboardData.items;
      for (let index in items) {
        if (items[index].kind === 'file') {
          processImageFile(items[index].getAsFile());
          return;
        }
      }
    });

    async function handleManualPaste() {
      try {
        const clipboardItems = await navigator.clipboard.read();
        for (const item of clipboardItems) {
          if (item.types.includes('text/plain')) {
            const blob = await item.getType('text/plain');
            const text = await blob.text();
            if (text.trim()) {
              parseCode(text);
              return; 
            }
          }
          const imageTypes = item.types.filter(type => type.startsWith('image/'));
          for (const type of imageTypes) {
            const blob = await item.getType(type);
            processImageFile(blob);
            return; 
          }
        }
      } catch (err) {
        try {
           const fallbackText = await navigator.clipboard.readText();
           if(fallbackText.trim()) parseCode(fallbackText);
        } catch(e) { alert("Paste failed - check permissions"); }
      }
    }

    function toggleCopy() {
      autoCopy = !autoCopy;
      copyToggle.textContent = autoCopy ? 'auto copy on' : 'auto copy off';
      copyToggle.classList.toggle('off', !autoCopy);
    }

    function handleFileUpload(event) {
      if (event.target.files[0]) processImageFile(event.target.files[0]);
    }

    function processImageFile(blob) {
      const url = URL.createObjectURL(blob);
      uploadedImg.src = url;
      uploadedImg.onload = () => {
        if (stream) { stream.getTracks().forEach(t => t.stop()); isCameraOn = false; }
        video.style.display = 'none';
        uploadedImg.style.display = 'block';
        document.getElementById('loading-msg').style.display = 'none';
        aimBox.style.display = 'none'; 
        currentMode = 'image';
        mainBtn.textContent = "scan image";
      }
    }

    async function handleFlow() {
      if (currentMode === 'camera' && !isCameraOn) {
        mainBtn.textContent = "starting...";
        await initWorker();
        try {
          stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: 'environment', width: { ideal: 1280 } } 
          });
          video.srcObject = stream;
          video.style.display = 'block';
          uploadedImg.style.display = 'none';
          document.getElementById('loading-msg').style.display = 'none';
          aimBox.style.display = 'block';
          isCameraOn = true;
          mainBtn.textContent = "scan";
        } catch (e) { alert("Camera error"); mainBtn.textContent = "scan"; }
      } else {
        await initWorker(); 
        scan();
      }
    }

    async function initWorker() {
      if (worker) return;
      worker = Tesseract.createWorker({
        logger: m => { if(m.status === 'recognizing text') bar.style.width = (m.progress * 100) + '%'; }
      });
      await worker.load();
      await worker.loadLanguage('eng');
      await worker.initialize('eng');
      await worker.setParameters({ tessedit_char_whitelist: '0123456789MFJONmsqp_ /\\-.,;:_[]{}\|' });
    }

    function scan() {
      mainBtn.disabled = true;
      if (currentMode === 'image') {
        canvas.width = uploadedImg.naturalWidth;
        canvas.height = uploadedImg.naturalHeight;
      } else {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
      }
      ctx.filter = 'grayscale(100%) contrast(300%) brightness(110%)';
      ctx.drawImage(currentMode === 'image' ? uploadedImg : video, 0, 0);
      
      worker.recognize(canvas).then(({ data: { text } }) => {
        parseCode(text);
        mainBtn.disabled = false;
        bar.style.width = '0%';
      });
    }
  </script>
</body>
</html>
