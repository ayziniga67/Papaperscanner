<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeepSearch - Question Finder</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #1a2a3a; --card: #004d4d; --accent: #38bdf8; --text: #ffffff; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
    .header { text-align: center; margin-bottom: 20px; }
    .header h1 { font-family: 'Montserrat', sans-serif; font-size: 1.4rem; letter-spacing: 2px; }
    
    #preview-wrap { width: 100%; max-width: 340px; height: 200px; background: #0b1926; border-radius: 15px; margin-bottom: 15px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
    #preview-img { width: 100%; height: 100%; object-fit: contain; }

    input[type="text"] {
      width: 100%; max-width: 340px; padding: 14px; border-radius: 8px; border: 2px solid #ffffff;
      background: rgba(0, 77, 77, 0.3); color: white; text-align: center; margin-bottom: 15px; outline: none;
    }

    .btn { width: 100%; max-width: 340px; padding: 15px; border-radius: 8px; border: 1.5px solid white; background: transparent; color: white; font-weight: 600; cursor: pointer; margin-bottom: 10px; }
    .btn:active { background: rgba(255,255,255,0.1); }
    .btn-main { background: var(--accent); color: #000; border: none; }

    #status { font-size: 0.85rem; opacity: 0.7; margin-bottom: 15px; text-align: center; }
    
    .result-section { width: 100%; max-width: 340px; background: rgba(0, 77, 77, 0.4); padding: 20px; border-radius: 12px; border: 3px solid #ffffff; display: none; }
    .page-box { font-size: 1.5rem; font-weight: 700; color: var(--accent); margin: 10px 0; }
    .ms-link { display: block; background: #ffffff; color: #004d4d; padding: 15px; text-align: center; border-radius: 8px; text-decoration: none; font-weight: 700; margin-top: 10px; }
    
    .progress-bar { width: 100%; max-width: 340px; height: 4px; background: rgba(255,255,255,0.1); margin-top: 10px; position: relative; overflow: hidden; }
    #bar { height: 100%; background: var(--accent); width: 0%; transition: 0.3s; }
  </style>
</head>
<body>

  <div class="header">
    <h1>DeepSearch v1</h1>
    <p style="font-size: 0.7rem; opacity: 0.6;">Find the exact page from a photo</p>
  </div>

  <div id="preview-wrap">
    <img id="preview-img" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
  </div>

  <input type="text" id="manual-sub" placeholder="Subject Code (e.g. 9702)">

  <input type="file" id="file-input" accept="image/*" style="display:none" onchange="loadImg(event)">
  <button class="btn" onclick="document.getElementById('file-input').click()">Upload Question</button>
  <button id="find-btn" class="btn btn-main" style="display:none" onclick="runDeepSearch()">Deep Search PDF</button>

  <div id="status">Ready...</div>
  <div class="progress-bar"><div id="bar"></div></div>

  <div id="result" class="result-section">
    <span style="font-size: 0.7rem; text-transform: uppercase;">Paper Identified</span>
    <div id="paper-title" style="font-weight: 600;">---</div>
    <div class="page-box" id="page-num">Searching...</div>
    <a id="ms-url" class="ms-link" target="_blank">View Mark Scheme</a>
  </div>

  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
    let extractedText = "";

    function loadImg(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (f) => {
        document.getElementById('preview-img').src = f.target.result;
        document.getElementById('find-btn').style.display = 'block';
        document.getElementById('status').textContent = "Image loaded.";
        document.getElementById('result').style.display = 'none';
      };
      reader.readAsDataURL(file);
    }

    async function runDeepSearch() {
      const status = document.getElementById('status');
      const bar = document.getElementById('bar');
      const findBtn = document.getElementById('find-btn');
      
      findBtn.disabled = true;
      status.textContent = "OCR: Starting analysis...";
      
      try {
        // Initialize Tesseract 5 (fast & stable)
        const worker = await Tesseract.createWorker('eng', 1, {
          logger: m => { if(m.status === 'recognizing text') bar.style.width = (m.progress * 100) + '%'; }
        });
        
        const { data: { text } } = await worker.recognize(document.getElementById('preview-img'));
        extractedText = text;
        await worker.terminate();
        
        status.textContent = "Processing code...";
        parseAndSearch(text);
      } catch (err) {
        status.textContent = "Error: " + err.message;
        findBtn.disabled = false;
      }
    }

    async function parseAndSearch(text) {
      const subInput = document.getElementById('manual-sub').value.trim() || "9702";
      const clean = text.toUpperCase().replace(/\s+/g, '');
      
      // Look for the M23/12/Q1 format
      const mMatch = clean.match(/([FMSW])(\d{2})\/(\d{1,2})/); 
      
      if (mMatch) {
        const seasKey = mMatch[1]; // M
        const yr = mMatch[2];      // 23
        const papVar = mMatch[3];  // 12
        
        let seas = (seasKey === 'M' || seasKey === 'F') ? 'm' : (seasKey === 'S' || seasKey === 'J' ? 's' : 'w');
        
        // Construct PapaCambridge URL
        const qpUrl = `https://pastpapers.papacambridge.com/directories/CAIE/CAIE-pastpapers/upload/${subInput}_${seas}${yr}_qp_${papVar}.pdf`;
        const msUrl = `https://pastpapers.papacambridge.com/directories/CAIE/CAIE-pastpapers/upload/${subInput}_${seas}${yr}_ms_${papVar}.pdf`;

        document.getElementById('result').style.display = 'block';
        document.getElementById('paper-title').textContent = `${subInput} / ${seasKey}${yr} / Paper ${papVar}`;
        
        await findPageInPdf(qpUrl, msUrl, text);
      } else {
        document.getElementById('status').textContent = "Couldn't find paper ID in image (e.g., M23/12).";
        document.getElementById('find-btn').disabled = false;
      }
    }

    async function findPageInPdf(qpUrl, msUrl, ocrText) {
      const status = document.getElementById('status');
      const pageDisp = document.getElementById('page-num');
      
      status.textContent = "Downloading PDF and searching pages...";
      
      // Use CORS Proxy to bypass PapaCambridge block
      const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(qpUrl)}`;

      try {
        const loadingTask = pdfjsLib.getDocument(proxyUrl);
        const pdf = await loadingTask.promise;
        
        // Pick 3 unique words from the question for matching
        const words = ocrText.toLowerCase().replace(/[^a-z ]/g, '').split(' ')
                      .filter(w => w.length > 4).slice(0, 4);

        let targetPage = 1;

        for (let i = 1; i <= pdf.numPages; i++) {
          const page = await pdf.getPage(i);
          const content = await page.getTextContent();
          const pageText = content.items.map(item => item.str).join(' ').toLowerCase();
          
          // Match logic: If at least 2 key words are on the page
          const matchCount = words.filter(word => pageText.includes(word)).length;
          if (matchCount >= 2) {
            targetPage = i;
            break;
          }
        }

        pageDisp.textContent = "Question on Page " + targetPage;
        document.getElementById('ms-url').href = `${msUrl}#page=${targetPage}`;
        status.textContent = "Deep Search Complete!";
      } catch (err) {
        status.textContent = "PDF access error (CORS or Paper not found).";
        document.getElementById('ms-url').href = msUrl;
        pageDisp.textContent = "Page search failed";
      }
      document.getElementById('find-btn').disabled = false;
    }
  </script>
</body>
</html>
