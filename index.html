<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cambridge Scanner Pro</title>
  <script src="https://unpkg.com/tesseract.js@2.1.5/dist/tesseract.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #1a2a3a;
      --card-bg: #004d4d;
      --text-main: #ffffff;
      --accent-teal: #006666;
      --progress-bg: #4a5a6a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 50px 20px;
    }

    .header { text-align: center; margin-bottom: 30px; }
    .header h1 {
      font-family: 'Montserrat', sans-serif;
      font-size: 2.2rem;
      font-weight: 400;
      letter-spacing: 2px;
      margin-bottom: 5px;
    }
    .header p { font-size: 0.9rem; opacity: 0.8; font-weight: 300; }

    #video-wrap {
      width: 100%;
      max-width: 340px;
      height: 240px;
      background: var(--card-bg);
      border-radius: 15px;
      position: relative;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 25px;
    }

    video { width: 100%; height: 100%; object-fit: cover; display: none; }
    #uploaded-img { width: 100%; height: 100%; object-fit: contain; display: none; background: #0b1926; }

    #aim-box {
      position: absolute;
      width: 80%;
      height: 55px;
      border: 2px solid #ffffff;
      border-radius: 10px;
      pointer-events: none;
      z-index: 5;
    }

    .action-row {
      display: flex;
      gap: 10px;
      margin-bottom: 40px;
      width: 100%;
      max-width: 340px;
      justify-content: space-between;
    }

    .btn-action {
      background: transparent;
      color: white;
      border: 1.5px solid #ffffff;
      padding: 10px 0;
      border-radius: 10px;
      font-size: 1rem;
      font-family: 'Outfit', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      flex: 1;
      text-align: center;
    }
    .btn-action:active { background: rgba(255,255,255,0.1); transform: scale(0.96); }
    .btn-action:disabled { opacity: 0.5; cursor: not-allowed; }

    .output-section { width: 100%; max-width: 340px; position: relative; }

    .output-section h2 {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.8rem;
      margin-bottom: 10px;
    }

    .output-box {
      width: 100%;
      background: linear-gradient(90deg, #004d4d 0%, #1a2a3a 100%);
      padding: 15px;
      border-radius: 8px;
      font-size: 1.1rem;
      color: #ffffff;
      min-height: 50px;
      display: flex;
      align-items: center;
      box-shadow: inset 0 0 15px rgba(0, 255, 255, 0.1);
    }

    /* ── Sub-info rows (subject + code) ── */
    .sub-row {
      margin-top: 8px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .sub-label {
      font-size: 0.65rem;
      opacity: 0.45;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .sub-value {
      font-size: 0.82rem;
      opacity: 0.75;
      font-family: monospace;
    }
    /* ── end sub-info ── */

    .copy-status-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 10px;
    }

    .toggle-btn {
      background: transparent;
      border: 1px solid #ffffff;
      color: white;
      padding: 5px 12px;
      border-radius: 12px;
      font-size: 0.7rem;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      transition: opacity 0.3s;
    }
    .toggle-btn.off { opacity: 0.4; border-color: rgba(255,255,255,0.5); }

    .progress-container {
      width: 100%;
      height: 2px;
      background: var(--progress-bg);
      margin-top: 10px;
    }
    #bar { height: 100%; background: #ffffff; width: 0%; transition: width 0.1s; }
    .progress-label { font-size: 0.7rem; margin-top: 5px; opacity: 0.7; }

    canvas { display: none; }
  </style>
</head>
<body>

  <div class="header">
    <h1>CAMBRIGE IS GAY</h1>
    <p>idk man how i created ts it happened</p>
  </div>

  <div id="video-wrap">
    <video id="video" autoplay playsinline muted></video>
    <img id="uploaded-img" alt="Uploaded paper code preview">
    <div id="aim-box"></div>
    <div id="loading-msg">Camera Off</div>
  </div>

  <div class="action-row">
    <button class="btn-action" id="main-btn" onclick="handleFlow()">scan</button>
    <label class="btn-action" for="file-upload" style="cursor: pointer; display: flex; align-items: center; justify-content: center;">upload</label>
    <input type="file" id="file-upload" accept="image/*" style="display: none;" onchange="handleFileUpload(event)">
    <button class="btn-action" onclick="handleManualPaste()">paste</button>
  </div>

  <div class="output-section">
    <h2>Output</h2>

    <div class="output-box" id="result-text">output here</div>

    <!-- Subject name + raw code rows — restored -->
    <div class="sub-row" id="subject-row" style="display:none">
      <span class="sub-label">Subject</span>
      <span class="sub-value" id="subject-text">—</span>
    </div>
    <div class="sub-row" id="code-row" style="display:none">
      <span class="sub-label">Code</span>
      <span class="sub-value" id="code-text">—</span>
    </div>

    <div class="copy-status-row">
      <button class="toggle-btn off" id="copy-toggle" onclick="toggleCopy()">auto copy off</button>
    </div>

    <div class="progress-container"><div id="bar"></div></div>
    <p class="progress-label" id="prog-label">progress bar</p>
  </div>

  <canvas id="canvas"></canvas>

  <script>
    const video      = document.getElementById('video');
    const uploadedImg= document.getElementById('uploaded-img');
    const canvas     = document.getElementById('canvas');
    const ctx        = canvas.getContext('2d');
    const resultEl   = document.getElementById('result-text');
    const subjectEl  = document.getElementById('subject-text');
    const codeEl     = document.getElementById('code-text');
    const mainBtn    = document.getElementById('main-btn');
    const bar        = document.getElementById('bar');
    const copyToggle = document.getElementById('copy-toggle');
    const aimBox     = document.getElementById('aim-box');
    const progLabel  = document.getElementById('prog-label');

    let stream      = null;
    let worker      = null;
    let isCameraOn  = false;
    let currentMode = 'camera';
    let autoCopy    = false;
    let scanning    = false; // FIX: prevents double-tap races

    // ── Subject lookup ────────────────────────────────────────────────────────
    const SUBJECTS = {
      '9700': 'Biology', '9701': 'Chemistry', '9702': 'Physics',
      '9703': 'Biology (old)', '9706': 'Accounting', '9707': 'Business',
      '9708': 'Economics', '9709': 'Mathematics', '9231': 'Further Mathematics',
      '9093': 'English Language', '9695': 'English Literature',
      '9389': 'History', '9696': 'Geography', '9251': 'Law',
      '9608': 'Computer Science', '9618': 'Computer Science',
      '9713': 'Applied ICT', '9990': 'Psychology', '9489': 'History',
      '9626': 'Law', '8291': 'English Language',
    };

    // ── Paste support ─────────────────────────────────────────────────────────
    window.addEventListener('paste', e => {
      const items = (e.clipboardData || e.originalEvent.clipboardData).items;
      for (let index in items) {
        if (items[index].kind === 'file') {
          processImageFile(items[index].getAsFile());
        }
      }
    });

    async function handleManualPaste() {
      try {
        const clipboardItems = await navigator.clipboard.read();
        for (const item of clipboardItems) {
          const imageTypes = item.types.filter(type => type.startsWith('image/'));
          for (const type of imageTypes) {
            const blob = await item.getType(type);
            processImageFile(blob);
            return;
          }
        }
        progLabel.textContent = 'No image found in clipboard.';
      } catch (err) {
        progLabel.textContent = 'Clipboard access denied — try uploading instead.';
      }
    }

    function toggleCopy() {
      autoCopy = !autoCopy;
      copyToggle.textContent = autoCopy ? 'auto copy on' : 'auto copy off';
      copyToggle.classList.toggle('off', !autoCopy);
    }

    function handleFileUpload(event) {
      if (event.target.files[0]) processImageFile(event.target.files[0]);
    }

    function processImageFile(blob) {
      const url = URL.createObjectURL(blob);
      uploadedImg.src = url;
      uploadedImg.onload = () => {
        if (stream) { stream.getTracks().forEach(t => t.stop()); isCameraOn = false; }
        video.style.display        = 'none';
        uploadedImg.style.display  = 'block';
        document.getElementById('loading-msg').style.display = 'none';
        aimBox.style.display       = 'none';
        currentMode                = 'image';
        mainBtn.textContent        = 'scan image';
      };
    }

    // ── Main button ───────────────────────────────────────────────────────────
    async function handleFlow() {
      if (scanning) return;

      if (currentMode === 'camera' && !isCameraOn) {
        mainBtn.textContent = 'starting...';
        await initWorker();
        try {
          stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment', width: { ideal: 1280 } }
          });
          video.srcObject           = stream;
          video.style.display       = 'block';
          uploadedImg.style.display = 'none';
          document.getElementById('loading-msg').style.display = 'none';
          aimBox.style.display      = 'block';
          isCameraOn                = true;
          mainBtn.textContent       = 'scan';
        } catch (e) {
          progLabel.textContent = 'Camera access denied.';
          mainBtn.textContent   = 'scan';
        }
      } else {
        await initWorker();
        scan();
      }
    }

    // ── Worker — init once, reuse for speed ───────────────────────────────────
    async function initWorker() {
      if (worker) return;
      progLabel.textContent = 'Loading OCR…';
      worker = Tesseract.createWorker({
        logger: m => {
          if (m.status === 'recognizing text') {
            bar.style.width       = (m.progress * 100) + '%';
            progLabel.textContent = 'Reading… ' + Math.round(m.progress * 100) + '%';
          }
        }
      });
      await worker.load();
      await worker.loadLanguage('eng');
      await worker.initialize('eng');
      // FIX: PSM 7 = single text line — much faster than default page mode
      // FIX: whitelist expanded to A-Z so session letters aren't silently eaten
      await worker.setParameters({
        tessedit_pageseg_mode: '7',
        tessedit_char_whitelist: '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz/\\-. ',
      });
      progLabel.textContent = 'OCR ready.';
    }

    // ── Scan ──────────────────────────────────────────────────────────────────
    async function scan() {
      if (scanning) return;
      scanning         = true;  // FIX: guard against double-tap
      mainBtn.disabled = true;
      bar.style.width  = '0%';

      try {
        if (currentMode === 'image') {
          // FIX: read FULL image — no cropping
          canvas.width  = uploadedImg.naturalWidth;
          canvas.height = uploadedImg.naturalHeight;
          ctx.filter    = 'grayscale(100%) contrast(300%) brightness(110%)';
          ctx.drawImage(uploadedImg, 0, 0);
          ctx.filter    = 'none'; // FIX: reset filter so it doesn't leak
        } else if (isCameraOn) {
          canvas.width  = video.videoWidth;
          canvas.height = video.videoHeight;
          ctx.filter    = 'grayscale(100%) contrast(300%) brightness(110%)';
          ctx.drawImage(video, 0, 0);
          ctx.filter    = 'none'; // FIX: reset filter
        } else {
          mainBtn.disabled = false;
          scanning         = false;
          return;
        }

        const { data: { text } } = await worker.recognize(canvas); // FIX: wrapped in try/catch via outer block

        // Normalise: uppercase, keep alphanumeric + separators
        const clean = text.toUpperCase().replace(/[^0-9A-Z\/\-\. ]/g, ' ');

        // Extract code using robust regex (handles any separator or none)
        const code = extractCode(clean);

        if (code) {
          const formatted = outPaper(code);
          const subjCode  = code.split('/')[0];
          const subjName  = SUBJECTS[subjCode] || 'Unknown Subject';

          resultEl.textContent = formatted;
          subjectEl.textContent = subjName + ' (' + subjCode + ')';
          codeEl.textContent    = code;

          document.getElementById('subject-row').style.display = 'flex';
          document.getElementById('code-row').style.display    = 'flex';

          progLabel.textContent = '✅ Found';

          if (autoCopy) {
            navigator.clipboard.writeText(formatted).then(() => {
              const orig = copyToggle.textContent;
              copyToggle.textContent = 'COPIED!';
              setTimeout(() => { copyToggle.textContent = orig; }, 1000);
            });
          }
        } else {
          resultEl.textContent = 'No code found';
          document.getElementById('subject-row').style.display = 'none';
          document.getElementById('code-row').style.display    = 'none';
          progLabel.textContent = '⚠️ No code — try closer or steadier.';
        }

      } catch (err) {
        // FIX: previously crash here left button permanently disabled
        resultEl.textContent  = 'Error';
        progLabel.textContent = 'OCR error: ' + (err.message || err);
      }

      bar.style.width  = '0%';
      mainBtn.disabled = false;
      scanning         = false; // FIX: always release lock
    }

    // ── extractCode ───────────────────────────────────────────────────────────
    // Handles slash / dash / space / no separator between parts.
    // Also normalises common OCR digit confusion (O→0, l→1 etc.)
    function extractCode(raw) {
      const text = raw.replace(/\s+/g, ' ').trim();

      function normD(s) {
        return s
          .replace(/[oO]/g, '0').replace(/[lI]/g, '1')
          .replace(/[sS]/g, '5').replace(/[zZ]/g, '2')
          .replace(/[gG]/g, '9').replace(/[bB]/g, '8');
      }

      // Separator: any of / - – — _ | . space, or nothing
      const SEP = '[\\s\\/\\-\\_\\|\\.]*';

      function tryMatch(t) {
        // A) 4d SEP 1-2d SEP 2L SEP 2d  →  9709/12/MJ/23
        let m = t.match(new RegExp('(\\d{4})' + SEP + '(\\d{1,2})' + SEP + '([A-Z]{2})' + SEP + '(\\d{2})(?!\\d)'));
        if (m) return `${normD(m[1])}/${normD(m[2])}/${m[3]}/${normD(m[4])}`;

        // B) Split session: 4d SEP 1-2d SEP 1L SEP 1L SEP 2d  →  9709/12/F/M/23
        m = t.match(new RegExp('(\\d{4})' + SEP + '(\\d{1,2})' + SEP + '([A-Z0])' + SEP + '([A-Z])' + SEP + '(\\d{2})(?!\\d)'));
        if (m) return `${normD(m[1])}/${normD(m[2])}/${(m[3]+m[4])}/${normD(m[5])}`;

        // C) No separators at all: 4d 2d 2L 2d  →  970912MJ23
        m = t.match(/(\d{4})(\d{2})([A-Z]{2})(\d{2})(?!\d)/);
        if (m) return `${m[1]}/${m[2]}/${m[3]}/${m[4]}`;

        return null;
      }

      return tryMatch(text) || tryMatch(normD(text));
    }

    // ── outPaper ──────────────────────────────────────────────────────────────
    function outPaper(code) {
      const p  = code.replace(/\//g, '').replace(/\s/g, '').trim();
      let out  = 'Paper ' + p[4] + ' Variant ' + p[5];
      const sf = p[6].toUpperCase();
      if      (sf === 'F')               out += ' March';
      else if (sf === 'M')               out += ' Summer';
      else if (sf === 'O' || sf === '0') out += ' Winter';
      else                               out += ' ' + p.substring(6, 8);
      out += ' 20' + p.slice(-2);
      return out;
    }
  </script>
</body>
</html>
