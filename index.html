<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cambridge Scanner Pro</title>
  <script src="https://unpkg.com/tesseract.js@2.1.5/dist/tesseract.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #1a2a3a;
      --card-bg: #004d4d;
      --text-main: #ffffff;
      --accent-teal: #006666;
      --scan-fill: #004346;
      --progress-bg: #4a5a6a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .header { text-align: center; margin-bottom: 25px; }
    .header h1 {
      font-family: 'Montserrat', sans-serif;
      font-size: 2.2rem;
      font-weight: 400;
      letter-spacing: 2px;
      margin-bottom: 5px;
    }
    .header p { font-size: 0.9rem; opacity: 0.8; font-weight: 300; }

    #video-wrap {
      width: 100%;
      max-width: 340px;
      height: 240px;
      background: var(--card-bg);
      border-radius: 15px;
      position: relative;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 20px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    video, #uploaded-img { width: 100%; height: 100%; object-fit: cover; display: none; }
    #uploaded-img { object-fit: contain; background: #0b1926; }

    #aim-box {
      position: absolute;
      width: 80%;
      height: 55px;
      border: 2px solid #ffffff;
      border-radius: 10px;
      pointer-events: none;
      z-index: 5;
    }

    .controls-container {
      width: 100%;
      max-width: 340px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 35px;
    }

    .btn-main {
      background: var(--scan-fill);
      color: white;
      border: 1.5px solid #ffffff;
      padding: 16px 0;
      border-radius: 12px;
      font-size: 1.3rem;
      font-weight: 600;
      font-family: 'Outfit', sans-serif;
      cursor: pointer;
      width: 100%;
      transition: all 0.2s;
      text-transform: lowercase;
    }

    .secondary-row { display: flex; gap: 12px; }

    .btn-secondary {
      background: transparent;
      color: white;
      border: 1.2px solid rgba(255,255,255,0.7);
      padding: 10px 0;
      border-radius: 10px;
      font-size: 0.95rem;
      font-family: 'Outfit', sans-serif;
      cursor: pointer;
      flex: 1;
      text-align: center;
      transition: all 0.2s;
    }
    
    .btn-main:active, .btn-secondary:active { transform: scale(0.97); opacity: 0.8; }

    /* Output Styling */
    .output-section { width: 100%; max-width: 340px; position: relative; }
    .output-section h2 { font-family: 'Montserrat', sans-serif; font-size: 1.8rem; margin-bottom: 10px; }

    .output-box {
      width: 100%;
      background: linear-gradient(90deg, #004d4d 0%, #1a2a3a 100%);
      padding: 15px;
      border-radius: 8px;
      min-height: 70px;
      display: flex;
      flex-direction: column; /* Stacks subject and code */
      justify-content: center;
      align-items: flex-start;
      box-shadow: inset 0 0 15px rgba(0, 255, 255, 0.05);
    }

    #subject-display {
      font-size: 0.85rem;
      opacity: 0.8;
      margin-bottom: 4px;
      font-weight: 300;
    }

    #result-text {
      font-size: 1.15rem;
      font-weight: 600;
      color: #ffffff;
    }

    .copy-status-row { display: flex; justify-content: flex-end; margin-top: 10px; }
    .toggle-btn {
      background: transparent;
      border: 1px solid #ffffff;
      color: white;
      padding: 5px 12px;
      border-radius: 12px;
      font-size: 0.7rem;
      cursor: pointer;
    }
    .toggle-btn.off { opacity: 0.4; }

    .progress-container { width: 100%; height: 2px; background: var(--progress-bg); margin-top: 10px; }
    #bar { height: 100%; background: #ffffff; width: 0%; transition: width 0.1s; }
    .progress-label { font-size: 0.7rem; margin-top: 5px; opacity: 0.6; }

    canvas { display: none; }
  </style>
</head>
<body>

  <div class="header">
    <h1>CAMBRIGE IS GAY</h1>
    <p>idk man how i created ts it happened</p>
  </div>

  <div id="video-wrap">
    <video id="video" autoplay playsinline muted></video>
    <img id="uploaded-img">
    <div id="aim-box"></div>
    <div id="loading-msg">Camera Off</div>
  </div>

  <div class="controls-container">
    <button class="btn-main" id="main-btn" onclick="handleFlow()">scan</button>
    
    <div class="secondary-row">
      <label class="btn-secondary" for="file-upload">upload</label>
      <input type="file" id="file-upload" accept="image/*" style="display: none;" onchange="handleFileUpload(event)">
      <button class="btn-secondary" onclick="handleManualPaste()">paste</button>
    </div>
  </div>

  <div class="output-section">
    <h2>Output</h2>
    <div class="output-box">
      <div id="subject-display"></div>
      <div id="result-text">output here</div>
    </div>
    
    <div class="copy-status-row">
      <button class="toggle-btn off" id="copy-toggle" onclick="toggleCopy()">auto copy off</button>
    </div>

    <div class="progress-container"><div id="bar"></div></div>
    <p class="progress-label">progress bar</p>
  </div>

  <canvas id="canvas"></canvas>

  <script>
    const video = document.getElementById('video');
    const uploadedImg = document.getElementById('uploaded-img');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const resultEl = document.getElementById('result-text');
    const subjectEl = document.getElementById('subject-display');
    const mainBtn = document.getElementById('main-btn');
    const bar = document.getElementById('bar');
    const copyToggle = document.getElementById('copy-toggle');
    const aimBox = document.getElementById('aim-box');
    
    let stream = null, worker = null, isCameraOn = false, currentMode = 'camera', autoCopy = false;

    // Subject Mapping Logic
    const subjectMap = {
      "9709": "Mathematics (9709)",
      "9618": "Computer science (9618)",
      "9702": "Physics (9702)"
    };

    window.addEventListener('paste', e => {
      const items = (e.clipboardData || e.originalEvent.clipboardData).items;
      for (let i in items) if (items[i].kind === 'file') processImageFile(items[i].getAsFile());
    });

    async function handleManualPaste() {
      try {
        const clipboardItems = await navigator.clipboard.read();
        for (const item of clipboardItems) {
          const imageTypes = item.types.filter(t => t.startsWith('image/'));
          if (imageTypes.length > 0) {
            const blob = await item.getType(imageTypes[0]);
            processImageFile(blob);
            return;
          }
        }
        alert("No image found in clipboard!");
      } catch (err) { alert("Clipboard access denied."); }
    }

    function toggleCopy() {
      autoCopy = !autoCopy;
      copyToggle.textContent = autoCopy ? 'auto copy on' : 'auto copy off';
      copyToggle.classList.toggle('off', !autoCopy);
    }

    function handleFileUpload(e) { if (e.target.files[0]) processImageFile(e.target.files[0]); }

    function processImageFile(blob) {
      const url = URL.createObjectURL(blob);
      uploadedImg.src = url;
      uploadedImg.onload = () => {
        if (stream) stream.getTracks().forEach(t => t.stop());
        isCameraOn = false; video.style.display = 'none'; aimBox.style.display = 'none';
        uploadedImg.style.display = 'block'; document.getElementById('loading-msg').style.display = 'none';
        currentMode = 'image'; mainBtn.textContent = "scan image";
      }
    }

    async function handleFlow() {
      if (currentMode === 'camera' && !isCameraOn) {
        mainBtn.textContent = "starting...";
        await initWorker();
        try {
          stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 1280 } } });
          video.srcObject = stream; video.style.display = 'block';
          uploadedImg.style.display = 'none'; document.getElementById('loading-msg').style.display = 'none';
          aimBox.style.display = 'block'; isCameraOn = true; mainBtn.textContent = "scan";
        } catch (e) { mainBtn.textContent = "scan"; }
      } else { await initWorker(); scan(); }
    }

    async function initWorker() {
      if (worker) return;
      worker = Tesseract.createWorker({
        logger: m => { if(m.status === 'recognizing text') bar.style.width = (m.progress * 100) + '%'; }
      });
      await worker.load(); await worker.loadLanguage('eng'); await worker.initialize('eng');
      await worker.setParameters({ tessedit_char_whitelist: '0123456789MFJONmfjon/\\-.,;:_[]{}\| ' });
    }

    function scan() {
      mainBtn.disabled = true;
      const target = (currentMode === 'image') ? uploadedImg : video;
      
      canvas.width = (currentMode === 'image') ? uploadedImg.naturalWidth : video.videoWidth;
      canvas.height = (currentMode === 'image') ? uploadedImg.naturalHeight : video.videoHeight;
      ctx.filter = 'grayscale(100%) contrast(300%) brightness(110%)';
      ctx.drawImage(target, 0, 0);
      
      worker.recognize(canvas).then(({ data: { text } }) => {
        const clean = text.replace(/[^0-9a-zA-Z]/g, '').toUpperCase();
        // Regex captures: [1] Subject, [2] Paper, [3] Variant, [4] Session, [5] Year
        const m = clean.match(/(\d{4})([1-8])([1-6])([MFJON]{1,4})(\d{2})/);
        
        if (m) {
          const subCode = m[1];
          const paperNum = m[2];
          const variantNum = m[3];
          const sessionCode = m[4];
          const yearNum = m[5];

          // 1. Determine Subject Name
          const subjectName = subjectMap[subCode] || `Subject (${subCode})`;
          
          // 2. Determine Session Name
          let sN = sessionCode.includes('J') ? "Summer" : (sessionCode.includes('O') || sessionCode.includes('N') ? "Winter" : "March");
          
          const fullResult = `Paper ${paperNum} Variant ${variantNum} ${sN} 20${yearNum}`;
          
          // Update Display
          subjectEl.textContent = subjectName;
          resultEl.textContent = fullResult;
          
          if(autoCopy) navigator.clipboard.writeText(fullResult);
        } else { 
          subjectEl.textContent = "";
          resultEl.textContent = "No code found"; 
        }
        mainBtn.disabled = false; bar.style.width = '0%';
      });
    }
  </script>
</body>
</html>
